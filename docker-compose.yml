services:

  # ─── Third-party infrastructure ───────────────────────────────────────────

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Databases ────────────────────────────────────────────────────────────

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  client-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clientdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - client-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  account-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - account-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  card-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carddb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - card-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  transaction-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transactiondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - transaction-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  credit-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: creditdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - credit-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  exchange-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exchangedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - exchange-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  stock-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5442:5432"
    volumes:
      - stock-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  verification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: verificationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - verification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5441:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Services ─────────────────────────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      USER_DB_HOST: user-db
      USER_DB_PORT: "5432"
      USER_DB_USER: postgres
      USER_DB_PASSWORD: postgres
      USER_DB_NAME: user_db
      USER_GRPC_ADDR: ":50052"
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      USER_DB_SSLMODE: disable
    ports:
      - "50052:50052"
    depends_on:
      user-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      AUTH_DB_HOST: auth-db
      AUTH_DB_PORT: "5432"
      AUTH_DB_USER: postgres
      AUTH_DB_PASSWORD: postgres
      AUTH_DB_NAME: auth_db
      AUTH_GRPC_ADDR: ":50051"
      USER_GRPC_ADDR: "user-service:50052"
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: docker-test-secret-change-me
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 168h
      REDIS_ADDR: redis:6379
      AUTH_DB_SSLMODE: disable
      FRONTEND_BASE_URL: "http://localhost:5173"
      PASSWORD_PEPPER: "${PASSWORD_PEPPER}"
      MOBILE_REFRESH_EXPIRY: "2160h"
      MOBILE_ACTIVATION_EXPIRY: "15m"
    ports:
      - "50051:50051"
    depends_on:
      auth-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    environment:
      NOTIFICATION_GRPC_ADDR: ":50053"
      KAFKA_BROKERS: kafka:9092
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-thebiggestdouchebagaround@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-eebu yksy isfx nanl}
      SMTP_FROM: ${SMTP_FROM:-thebiggestdouchebagaround@gmail.com}
      NOTIFICATION_DB_HOST: notification-db
      NOTIFICATION_DB_PORT: "5432"
      NOTIFICATION_DB_USER: postgres
      NOTIFICATION_DB_PASSWORD: postgres
      NOTIFICATION_DB_NAME: notification_db
      NOTIFICATION_DB_SSLMODE: disable
    ports:
      - "50053:50053"
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  client-service:
    build:
      context: .
      dockerfile: client-service/Dockerfile
    environment:
      CLIENT_DB_HOST: client-db
      CLIENT_DB_PORT: "5432"
      CLIENT_DB_USER: postgres
      CLIENT_DB_PASSWORD: postgres
      CLIENT_DB_NAME: clientdb
      CLIENT_GRPC_ADDR: ":50054"
      USER_GRPC_ADDR: "user-service:50052"
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
    ports:
      - "50054:50054"
    depends_on:
      client-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    environment:
      ACCOUNT_DB_HOST: account-db
      ACCOUNT_DB_PORT: "5432"
      ACCOUNT_DB_USER: postgres
      ACCOUNT_DB_PASSWORD: postgres
      ACCOUNT_DB_NAME: accountdb
      ACCOUNT_GRPC_ADDR: ":50055"
      CLIENT_GRPC_ADDR: "client-service:50054"
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
    ports:
      - "50055:50055"
    depends_on:
      account-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      client-service:
        condition: service_started

  card-service:
    build:
      context: .
      dockerfile: card-service/Dockerfile
    environment:
      CARD_DB_HOST: card-db
      CARD_DB_PORT: "5432"
      CARD_DB_USER: postgres
      CARD_DB_PASSWORD: postgres
      CARD_DB_NAME: carddb
      CARD_GRPC_ADDR: ":50056"
      CLIENT_GRPC_ADDR: "client-service:50054"
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
    ports:
      - "50056:50056"
    depends_on:
      card-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      client-service:
        condition: service_started

  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    environment:
      TRANSACTION_DB_HOST: transaction-db
      TRANSACTION_DB_PORT: "5432"
      TRANSACTION_DB_USER: postgres
      TRANSACTION_DB_PASSWORD: postgres
      TRANSACTION_DB_NAME: transactiondb
      TRANSACTION_GRPC_ADDR: ":50057"
      ACCOUNT_GRPC_ADDR: "account-service:50055"
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      EXCHANGE_GRPC_ADDR: "exchange-service:50059"
      VERIFICATION_GRPC_ADDR: "verification-service:50061"
    ports:
      - "50057:50057"
    depends_on:
      transaction-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      account-service:
        condition: service_started
      exchange-service:
        condition: service_started
      verification-service:
        condition: service_started

  credit-service:
    build:
      context: .
      dockerfile: credit-service/Dockerfile
    environment:
      CREDIT_DB_HOST: credit-db
      CREDIT_DB_PORT: "5432"
      CREDIT_DB_USER: postgres
      CREDIT_DB_PASSWORD: postgres
      CREDIT_DB_NAME: creditdb
      CREDIT_GRPC_ADDR: ":50058"
      ACCOUNT_GRPC_ADDR: "account-service:50055"
      CLIENT_GRPC_ADDR: "client-service:50054"
      USER_GRPC_ADDR: "user-service:50052"
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
    ports:
      - "50058:50058"
    depends_on:
      credit-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      account-service:
        condition: service_started
      client-service:
        condition: service_started
      user-service:
        condition: service_started

  exchange-service:
    build:
      context: .
      dockerfile: exchange-service/Dockerfile
    environment:
      EXCHANGE_DB_HOST: exchange-db
      EXCHANGE_DB_PORT: "5432"
      EXCHANGE_DB_USER: postgres
      EXCHANGE_DB_PASSWORD: postgres
      EXCHANGE_DB_NAME: exchangedb
      EXCHANGE_GRPC_ADDR: ":50059"
      KAFKA_BROKERS: kafka:9092
      EXCHANGE_COMMISSION_RATE: "0.005"
      EXCHANGE_SPREAD: "0.003"
      EXCHANGE_DB_SSLMODE: disable
    ports:
      - "50059:50059"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50059 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      exchange-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  stock-service:
    build:
      context: .
      dockerfile: stock-service/Dockerfile
    environment:
      STOCK_DB_HOST: stock-db
      STOCK_DB_PORT: "5432"
      STOCK_DB_USER: postgres
      STOCK_DB_PASSWORD: postgres
      STOCK_DB_NAME: stockdb
      STOCK_DB_SSLMODE: disable
      STOCK_GRPC_ADDR: ":50060"
      KAFKA_BROKERS: kafka:9092
      USER_GRPC_ADDR: "user-service:50052"
      ACCOUNT_GRPC_ADDR: "account-service:50055"
      EXCHANGE_GRPC_ADDR: "exchange-service:50059"
      CLIENT_GRPC_ADDR: "client-service:50054"
      STATE_ACCOUNT_NUMBER: "0000000000000099"
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      SECURITY_SYNC_INTERVAL_MINUTES: "15"
    ports:
      - "50060:50060"
    depends_on:
      stock-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      account-service:
        condition: service_started
      exchange-service:
        condition: service_started
      client-service:
        condition: service_started

  verification-service:
    build:
      context: .
      dockerfile: verification-service/Dockerfile
    environment:
      VERIFICATION_DB_HOST: verification-db
      VERIFICATION_DB_PORT: "5432"
      VERIFICATION_DB_USER: postgres
      VERIFICATION_DB_PASSWORD: postgres
      VERIFICATION_DB_NAME: verificationdb
      VERIFICATION_GRPC_ADDR: ":50061"
      KAFKA_BROKERS: kafka:9092
      VERIFICATION_DB_SSLMODE: disable
      VERIFICATION_CHALLENGE_EXPIRY: "5m"
      VERIFICATION_MAX_ATTEMPTS: "3"
    ports:
      - "50061:50061"
    depends_on:
      verification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─── API Gateway ──────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    environment:
      GATEWAY_HTTP_ADDR: ":8080"
      AUTH_GRPC_ADDR: "auth-service:50051"
      USER_GRPC_ADDR: "user-service:50052"
      CLIENT_GRPC_ADDR: "client-service:50054"
      ACCOUNT_GRPC_ADDR: "account-service:50055"
      CARD_GRPC_ADDR: "card-service:50056"
      TRANSACTION_GRPC_ADDR: "transaction-service:50057"
      CREDIT_GRPC_ADDR: "credit-service:50058"
      EXCHANGE_GRPC_ADDR: "exchange-service:50059"
      STOCK_GRPC_ADDR: "stock-service:50060"
      VERIFICATION_GRPC_ADDR: "verification-service:50061"
      NOTIFICATION_GRPC_ADDR: "notification-service:50053"
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      client-service:
        condition: service_started
      account-service:
        condition: service_started
      card-service:
        condition: service_started
      transaction-service:
        condition: service_started
      credit-service:
        condition: service_started
      exchange-service:
        condition: service_started
      stock-service:
        condition: service_started
      verification-service:
        condition: service_started
      notification-service:
        condition: service_started
      kafka:
        condition: service_healthy

  # ─── Seeder ───────────────────────────────────────────────────────────────
  # One-shot job: provisions the default admin account on first startup.
  # Idempotent — safe to re-run; exits 0 if admin is already active.
  seeder:
    build:
      context: .
      dockerfile: seeder/Dockerfile
    environment:
      USER_GRPC_ADDR: "user-service:50052"
      AUTH_GRPC_ADDR: "auth-service:50051"
      KAFKA_BROKERS: "kafka:9092"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@admin.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-AdminAdmin2026!.}"
    depends_on:
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      auth-service:
        condition: service_started
      notification-service:
        condition: service_started
    restart: on-failure

volumes:
  user_db_data:
  auth_db_data:
  redis_data:
  client-db-data:
  account-db-data:
  card-db-data:
  transaction-db-data:
  credit-db-data:
  exchange-db-data:
  stock-db-data:
  verification-db-data:
  notification-db-data:
