name: CI

on:
  push:
    branches: [Development, main]
  pull_request:
    branches: [Development, main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - notification-service
          - client-service
          - account-service
          - card-service
          - transaction-service
          - credit-service
          - exchange-service
          - stock-service
          - verification-service
          - seeder
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Build ${{ matrix.service }}
        run: cd ${{ matrix.service }} && go build -o bin/${{ matrix.service }} ./cmd

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - contract
          - api-gateway
          - auth-service
          - user-service
          - notification-service
          - client-service
          - account-service
          - card-service
          - transaction-service
          - credit-service
          - exchange-service
          - stock-service
          - verification-service
          - seeder
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Install gcc (for SQLite tests)
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Test ${{ matrix.service }}
        env:
          CGO_ENABLED: 1
        run: cd ${{ matrix.service }} && go test ./... -v -count=1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - notification-service
          - client-service
          - account-service
          - card-service
          - transaction-service
          - credit-service
          - exchange-service
          - stock-service
          - verification-service
          - seeder
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint on ${{ matrix.service }}
        run: cd ${{ matrix.service }} && golangci-lint run --timeout=90s ./...

  gofmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

  go-mod-tidy:
    name: Go Mod Tidy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Check go mod tidy
        run: |
          services=(
            contract
            api-gateway
            auth-service
            user-service
            notification-service
            client-service
            account-service
            card-service
            transaction-service
            credit-service
            exchange-service
            stock-service
            verification-service
            seeder
          )
          for svc in "${services[@]}"; do
            echo "Checking $svc..."
            cd "$svc" && go mod tidy && cd ..
          done
          if [ -n "$(git diff -- '**/go.mod' '**/go.sum')" ]; then
            echo "go.mod or go.sum is not tidy. Run 'make tidy' and commit the changes."
            git diff -- '**/go.mod' '**/go.sum'
            exit 1
          fi

  generated-files:
    name: Generated Files Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Install protoc
        run: |
          PB_REL="https://github.com/protocolbuffers/protobuf/releases"
          curl -LO $PB_REL/download/v34.0/protoc-34.0-linux-x86_64.zip
          sudo unzip -o protoc-34.0-linux-x86_64.zip -d /usr/local bin/protoc 'include/*'
          sudo chmod +x /usr/local/bin/protoc
          rm protoc-34.0-linux-x86_64.zip
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Regenerate protobuf files
        run: make proto

      - name: Regenerate swagger docs
        run: make swagger

      - name: Check for diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files are not up to date. Run 'make proto' and 'make swagger', then commit."
            git diff
            git status
            exit 1
          fi

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Start all services
        run: docker compose up --build -d --wait
        timeout-minutes: 15

      - name: Run integration tests
        working-directory: test-app
        env:
          TEST_GATEWAY_URL: http://localhost:8080
          TEST_KAFKA_BROKERS: localhost:9094
        run: go test -tags integration ./workflows/ -v -count=1 -timeout=30m

      - name: Stop services
        if: always()
        run: docker compose down -v
