      - OTCOptions
  /api/v3/otc/contracts/{id}/exercise:
    post:
      consumes:
      - application/json
      parameters:
      - description: contract id
        in: path
        name: id
        required: true
        type: integer
      - description: optional on-behalf client id; accounts come from the contract
        in: body
        name: body
        schema:
          $ref: '#/definitions/handler.exerciseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Exercise an OTC option contract
      tags:
      - OTCOptions
  /api/v3/otc/options:
    get:
      description: Phase 6 cross-bank discovery. Returns this bank's open
      parameters:
      - description: Filter to one ticker
        in: query
        name: ticker
        type: string
      - description: local|remote
        in: query
        name: kind
        type: string
      - description: Filter to one bank
        in: query
        name: bank_code
        type: string
      - description: sell_initiated|buy_initiated
        in: query
        name: direction
        type: string
      - description: 1-based, default 1
        in: query
        name: page
        type: integer
      - description: default 10
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Unified marketplace view of OPEN OTC option listings
      tags:
      - OTCOptions
  /api/v3/otc/options/{id}:
    get:
      parameters:
      - description: offer id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get an OTC offer with revisions
      tags:
      - OTCOptions
  /api/v3/otc/options/{id}/bid:
    post:
      consumes:
      - application/json
      description: Many bidders can each open their own chain against the same listing.
        First to accept wins atomically; siblings cascade-cancel.
      parameters:
      - description: parent OTCOffer listing id
        in: path
        name: id
        required: true
        type: integer
      - description: initial bid terms + bidder's account
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.openNegotiationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "409":
          description: chain already open for caller on this listing
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Place a bid on an OTC option listing (opens a negotiation chain)
      tags:
      - OTCOptions
  /api/v3/otc/options/{id}/negotiations:
    get:
      description: Used by the listing's poster to see all incoming bids. Returns
        chains in any status (active + terminal).
      parameters:
      - description: parent OTCOffer listing id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List every negotiation chain against a given OTC option listing
      tags:
      - OTCOptions
  /api/v3/otc/stocks/{id}/sell:
    post:
      consumes:
      - application/json
      description: The caller sells the requested quantity of shares into
      parameters:
      - description: otc_stock_buy_offers.id
        in: path
        name: id
        required: true
        type: integer
      - description: quantity + seller's destination account
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.sellOTCStockOfferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "412":
          description: offer not active OR seller short on shares
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Fill a buy-direction OTC stock offer (sell into it)
      tags:
      - OTCStocks
  /api/v3/otc/traders/{owner_type}/{owner_id}/rating:
    get:
      parameters:
      - description: client|bank
        in: path
        name: owner_type
        required: true
        type: string
      - description: owner id (0 for bank)
        in: path
        name: owner_id
        required: true
        type: integer
      - description: 1..100, default 20
        in: query
        name: recent_limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get a trader's aggregate OTC rating + recent comments
      tags:
      - OTCOptions
  /api/v3/portfolio/{portfolio_id}:
    get:
      description: portfolio_id is in the form client-<n>, bank, or fund-<n>.
      parameters:
      - description: Portfolio ID (client-42 / bank / fund-7)
        in: path
        name: portfolio_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid_portfolio_id
          schema:
            additionalProperties: true
            type: object
        "403":
          description: forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get unified portfolio by portfolio_id
      tags:
      - portfolio
  /api/v3/portfolio/bank:
    get:
      description: Returns the bank-owned securities holdings and fund positions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get the bank's unified portfolio
      tags:
      - portfolio
  /api/v3/portfolio/client/{client_id}:
    get:
      description: Requires portfolio.view_client permission.
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get unified portfolio for a specific client
      tags:
      - portfolio
  /api/v3/portfolio/investment-fund/{fund_id}:
    get:
      description: Requires portfolio.view_fund permission.
      parameters:
      - description: Fund ID
        in: path
        name: fund_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get unified portfolio for an investment fund
      tags:
      - portfolio
  /api/v3/roles/{id}/permissions:
    post:
      consumes:
      - application/json
      description: Grants a single permission to the role identified by ID. The permission
        is validated against the codegened catalog. Idempotent — granting a permission
        already held is a no-op. Requires roles.permissions.assign permission.
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: integer
      - description: Permission code to grant
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.assignPermissionRequest'
      produces:
      - application/json
      responses:
        "204":
          description: no content
        "400":
          description: validation error or permission not in catalog
          schema:
            additionalProperties: true
            type: object
        "401":
          description: unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: role not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Assign a permission to a role
      tags:
      - roles
  /api/v3/roles/{id}/permissions/{permission}:
    delete:
      description: Removes a single permission grant from the role identified by ID.
        Idempotent — revoking a permission not held is a no-op. Requires roles.permissions.revoke
        permission.
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: integer
      - description: Permission code to revoke
        in: path
        name: permission
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: no content
        "400":
          description: validation error
          schema:
            additionalProperties: true
            type: object
        "401":
          description: unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: role not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Revoke a permission from a role
      tags:
      - roles
  /api/v3/stock-sources:
    post:
      consumes:
      - application/json
      description: Wipes all stock-service securities and trading state, then reseeds
        from the new source. Admin-only.
      parameters:
      - description: 'target source: external | generated | simulator'
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.switchSourceRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Switch active stock data source (DESTRUCTIVE)
      tags:
      - Admin
  /api/v3/stock-sources/active:
    get:
      description: Returns the currently active stock data source, seeding status,
        and any error details.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get the current stock data source and status
      tags:
      - Admin
  /api/v3/watchlist/{portfolio_id}:
    get:
      description: portfolio_id is in the form client-<n>, bank, or fund-<n>.
      parameters:
      - description: Portfolio ID (client-42 / bank / fund-7)
        in: path
        name: portfolio_id
        required: true
        type: string
      - description: stock|option|futures|forex
        in: query
        name: listing_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get watchlist for any owner identified by portfolio_id
      tags:
      - Watchlist
securityDefinitions:
  BearerAuth:
    description: Enter "Bearer <token>"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
