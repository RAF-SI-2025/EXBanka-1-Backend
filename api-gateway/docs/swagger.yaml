    delete:
      description: Bidder-only — the listing's poster cannot cancel a bidder's chain
        (use reject instead).
      parameters:
      - description: parent listing id (sanity check)
        in: path
        name: id
        required: true
        type: integer
      - description: negotiation chain id
        in: path
        name: nid
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Cancel (withdraw) your own OTC option negotiation chain
      tags:
      - OTCOptions
  /api/v3/me/otc/options/{id}/negotiations/{nid}/accept:
    post:
      consumes:
      - application/json
      description: 'Caller must be the party OPPOSITE to whoever proposed the current
        terms. After the negotiation state TX (which flips this chain to "accepted",
        parent to "consumed", and cascade-cancels every sibling chain), the contract-formation
        saga runs: mints OptionContract from the negotiation''s snapshot terms, reserves
        seller''s underlying shares, reserves+settles buyer''s premium, credits the
        seller. If the saga fails (e.g. seller no longer has the shares, buyer is
        short on premium), the negotiation flips to "failed" and the parent stays
        consumed.'
      parameters:
      - description: parent listing id
        in: path
        name: id
        required: true
        type: integer
      - description: negotiation chain id
        in: path
        name: nid
        required: true
        type: integer
      - description: acceptor_account_id — caller's account that pays the premium
          (if accepter is the buyer) or receives it (if accepter is the seller)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.acceptNegotiationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: acceptor_account_id missing or not owned
          schema:
            additionalProperties: true
            type: object
        "403":
          description: caller proposed current terms or not a party
          schema:
            additionalProperties: true
            type: object
        "409":
          description: parent listing already consumed
          schema:
            additionalProperties: true
            type: object
        "412":
          description: contract-formation saga rejected (seller short on shares OR
            buyer short on premium)
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Accept the current terms on an OTC option negotiation chain
      tags:
      - OTCOptions
  /api/v3/me/otc/options/{id}/negotiations/{nid}/counter:
    post:
      consumes:
