basePath: /
definitions:
  handler.activateRequest:
    properties:
      confirm_password:
        type: string
      password:
        type: string
      token:
        type: string
    required:
    - confirm_password
    - password
    - token
    type: object
  handler.createEmployeeRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      date_of_birth:
        type: integer
      department:
        type: string
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        type: string
      username:
        type: string
    required:
    - date_of_birth
    - email
    - first_name
    - jmbg
    - last_name
    - role
    - username
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.logoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.passwordResetRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.resetPasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        type: string
      token:
        type: string
    required:
    - confirm_password
    - new_password
    - token
    type: object
  handler.updateEmployeeRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      department:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: EXBanka Banking Microservices API Gateway
  title: EXBanka API
  version: "1.0"
paths:
  /api/auth/activate:
    post:
      consumes:
      - application/json
      description: Activate a new account using the token from the activation email
        link
      parameters:
      - description: Activation token and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.activateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Activate account
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password, returns access and refresh
        tokens
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: access_token, refresh_token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke the refresh token to end the session
      parameters:
      - description: Refresh token to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.logoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success message
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout
      tags:
      - auth
  /api/auth/password/reset:
    post:
      consumes:
      - application/json
      description: Reset password using a token from the reset email link
      parameters:
      - description: Reset token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.resetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reset password
      tags:
      - auth
  /api/auth/password/reset-request:
    post:
      consumes:
      - application/json
      description: Send a password reset link to the user's email
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.passwordResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: confirmation message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Request password reset
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new access/refresh token pair
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: access_token, refresh_token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid refresh token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token
      tags:
      - auth
  /api/employees:
    get:
      description: Get paginated list of employees with optional filters
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Filter by email (partial match)
        in: query
        name: email
        type: string
      - description: Filter by first/last name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by position (partial match)
        in: query
        name: position
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: employees array and total_count
          schema:
            additionalProperties: true
            type: object
        "401":
          description: unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List employees
      tags:
      - employees
    post:
      consumes:
      - application/json
      description: Create employee and send activation email. Requires employees.create
        permission.
      parameters:
      - description: Employee data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createEmployeeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: created employee
          schema:
            additionalProperties: true
            type: object
        "400":
          description: validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new employee
      tags:
      - employees
  /api/employees/{id}:
    get:
      description: Retrieve a single employee's details
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: employee details
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid id
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get employee by ID
      tags:
      - employees
    put:
      consumes:
      - application/json
      description: Partially update employee fields. Cannot edit admin employees.
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateEmployeeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: updated employee
          schema:
            additionalProperties: true
            type: object
        "400":
          description: validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: cannot edit admin
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update an employee
      tags:
      - employees
securityDefinitions:
  BearerAuth:
    description: Enter "Bearer <token>"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
