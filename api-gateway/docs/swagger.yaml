    post:
      consumes:
      - application/json
      description: Inbound from a peer bank. Authenticated via PeerAuth (X-Api-Key
        or HMAC). Forwards the envelope to transaction-service which classifies on
        `type` and dispatches.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: 'Peer-to-peer: SI-TX wire entry (NEW_TX / COMMIT_TX / ROLLBACK_TX /
        VOTE)'
      tags:
      - PeerOTC
  /api/v3/cross-bank-protocol/interbank/{transaction_id}/status:
    get:
      description: Allows a peer bank to query the state of a cross-bank SI-TX transaction
        by its transactionId. Returns the state and our role (sender|receiver). Used
        by the Celina-5 CHECK_STATUS retry mechanism so stuck sagas can be resolved
        by either side.
      parameters:
      - description: SI-TX transaction UUID (idempotence key)
        in: path
        name: transaction_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 'Peer-to-peer: query cross-bank transaction status (CHECK_STATUS)'
      tags:
      - PeerOTC
  /api/v3/cross-bank-protocol/negotiations:
    post:
      consumes:
      - application/json
      description: Inbound from a peer bank's SI-TX layer. Authenticated via PeerAuth
        (X-Api-Key or HMAC). Persists a peer_otc_negotiations row keyed on (peer_bank_code,
        foreign_id). buyerId.routingNumber MUST match the authenticated peer's routing
        and sellerId.routingNumber MUST equal this bank.
      parameters:
      - description: SI-TX OtcOffer wire shape
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.peerOtcOfferReq'
      produces:
      - application/json
      responses:
        "201":
          description: ForeignBankId of the newly-created negotiation
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      summary: 'Peer-to-peer: create OTC option negotiation'
      tags:
      - PeerOTC
  /api/v3/cross-bank-protocol/negotiations/{rid}/{id}:
    delete:
      description: Inbound from a peer bank. Soft-cancels the negotiation row (status
        → cancelled). The row is preserved for audit per SI-TX §3.5.
      parameters:
      - description: routing number
        in: path
        name: rid
        required: true
        type: integer
      - description: foreign negotiation id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: 'Peer-to-peer: cancel an OTC negotiation'
      tags:
      - PeerOTC
    get:
      description: Inbound from a peer bank. Returns the full SI-TX OtcNegotiation
        record for the (peer_bank_code, foreign_id) pair.
      parameters:
      - description: routing number
        in: path
        name: rid
        required: true
        type: integer
      - description: foreign negotiation id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: 'Peer-to-peer: read an OTC negotiation'
      tags:
      - PeerOTC
    put:
      consumes:
      - application/json
      description: Inbound from a peer bank. Updates the offer JSON on a peer_otc_negotiations
        row. Only the peer that created the row (matched by peer_bank_code) can update
        it — peer-auth + (peer_bank_code, negotiation_id) lookup combo enforces this.
      parameters:
      - description: routing number (this bank's, that issued the foreign_id)
        in: path
        name: rid
        required: true
        type: integer
      - description: foreign negotiation id
        in: path
        name: id
        required: true
        type: string
      - description: new SI-TX OtcOffer terms
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.peerOtcOfferReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: 'Peer-to-peer: counter-offer on an existing OTC negotiation'
      tags:
      - PeerOTC
  /api/v3/cross-bank-protocol/negotiations/{rid}/{id}/accept:
    get:
      description: Inbound from the buyer's bank. The seller's bank composes the 4-posting
        NEW_TX (buyer-debit premium, seller-credit premium, seller-debit option asset,
        buyer-credit option asset) and dispatches via PeerTxService. SI-TX §3.6 specifies
        GET semantics.
      parameters:
      - description: routing number
        in: path
        name: rid
        required: true
        type: integer
      - description: foreign negotiation id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: transactionId + status
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
