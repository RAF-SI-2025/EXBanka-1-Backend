basePath: /
definitions:
  handler.activateRequest:
    properties:
      confirm_password:
        type: string
      password:
        type: string
      token:
        type: string
    required:
    - confirm_password
    - password
    - token
    type: object
  handler.createAccountRequest:
    properties:
      account_category:
        type: string
      account_kind:
        type: string
      account_type:
        type: string
      company_id:
        type: integer
      create_card:
        type: boolean
      currency_code:
        type: string
      employee_id:
        type: integer
      initial_balance:
        type: number
      owner_id:
        type: integer
    required:
    - account_kind
    - account_type
    - currency_code
    - owner_id
    type: object
  handler.createAuthorizedPersonRequest:
    properties:
      account_id:
        type: integer
      address:
        type: string
      date_of_birth:
        type: integer
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      last_name:
        type: string
      phone:
        type: string
    required:
    - account_id
    - first_name
    - last_name
    type: object
  handler.createCardRequest:
    properties:
      account_number:
        type: string
      card_brand:
        type: string
      owner_id:
        type: integer
      owner_type:
        type: string
    required:
    - account_number
    - owner_id
    - owner_type
    type: object
  handler.createClientRequest:
    properties:
      address:
        type: string
      date_of_birth:
        type: integer
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
    required:
    - date_of_birth
    - email
    - first_name
    - jmbg
    - last_name
    type: object
  handler.createCompanyRequest:
    properties:
      activity_code:
        type: string
      address:
        type: string
      company_name:
        type: string
      owner_id:
        type: integer
      registration_number:
        type: string
      tax_number:
        type: string
    required:
    - company_name
    - owner_id
    - registration_number
    type: object
  handler.createEmployeeRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      date_of_birth:
        type: integer
      department:
        type: string
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        type: string
      username:
        type: string
    required:
    - date_of_birth
    - email
    - first_name
    - jmbg
    - last_name
    - role
    - username
    type: object
  handler.createLoanRequestBody:
    properties:
      account_number:
        type: string
      amount:
        type: number
      client_id:
        type: integer
      currency_code:
        type: string
      employment_period:
        type: integer
      employment_status:
        type: string
      interest_type:
        type: string
      loan_type:
        type: string
      monthly_salary:
        type: number
      phone:
        type: string
      purpose:
        type: string
      repayment_period:
        type: integer
    required:
    - account_number
    - amount
    - client_id
    - currency_code
    - interest_type
    - loan_type
    - repayment_period
    type: object
  handler.createPaymentRecipientRequest:
    properties:
      account_number:
        type: string
      client_id:
        type: integer
      recipient_name:
        type: string
    required:
    - account_number
    - client_id
    - recipient_name
    type: object
  handler.createPaymentRequest:
    properties:
      amount:
        type: number
      from_account_number:
        type: string
      payment_code:
        type: string
      payment_purpose:
        type: string
      recipient_name:
        type: string
      reference_number:
        type: string
      to_account_number:
        type: string
    required:
    - amount
    - from_account_number
    - to_account_number
    type: object
  handler.createTransferRequest:
    properties:
      amount:
        type: number
      from_account_number:
        type: string
      to_account_number:
        type: string
    required:
    - amount
    - from_account_number
    - to_account_number
    type: object
  handler.createVerificationCodeRequest:
    properties:
      client_id:
        type: integer
      transaction_id:
        type: integer
      transaction_type:
        type: string
    required:
    - client_id
    - transaction_id
    - transaction_type
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.logoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.passwordResetRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.resetPasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        type: string
      token:
        type: string
    required:
    - confirm_password
    - new_password
    - token
    type: object
  handler.setPasswordRequest:
    properties:
      password_hash:
        type: string
      user_id:
        type: integer
    required:
    - password_hash
    - user_id
    type: object
  handler.updateAccountLimitsRequest:
    properties:
      daily_limit:
        type: number
      monthly_limit:
        type: number
    type: object
  handler.updateAccountNameRequest:
    properties:
      client_id:
        type: integer
      new_name:
        type: string
    required:
    - new_name
    type: object
  handler.updateAccountStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  handler.updateClientRequest:
    properties:
      address:
        type: string
      date_of_birth:
        type: integer
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      last_name:
        type: string
      phone:
        type: string
    type: object
  handler.updateEmployeeRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      department:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        type: string
    type: object
  handler.updatePaymentRecipientRequest:
    properties:
      account_number:
        type: string
      recipient_name:
        type: string
    type: object
  handler.validateVerificationCodeRequest:
    properties:
      client_id:
        type: integer
      code:
        type: string
      transaction_id:
        type: integer
    required:
    - client_id
    - code
    - transaction_id
    type: object
host: localhost:8080
info:
  contact: {}
  description: EXBanka Banking Microservices API Gateway
  title: EXBanka API
  version: "1.0"
paths:
  /api/accounts:
    get:
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: page_size
        type: integer
      - description: Filter by account name
        in: query
        name: name_filter
        type: string
      - description: Filter by account number
        in: query
        name: account_number_filter
        type: string
      - description: Filter by account type
        in: query
        name: type_filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      parameters:
      - description: Account data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create account
      tags:
      - accounts
  /api/accounts/{id}:
