basePath: /
definitions:
  handler.CalculateExchangeRequest:
    properties:
      amount:
        example: "100.00"
        type: string
      fromCurrency:
        example: EUR
        type: string
      toCurrency:
        example: USD
        type: string
    required:
    - amount
    - fromCurrency
    - toCurrency
    type: object
  handler.acceptOTCOfferRequest:
    properties:
      buyer_account_id:
        type: integer
      seller_account_id:
        type: integer
    type: object
  handler.activateDeviceReq:
    properties:
      code:
        type: string
      device_name:
        type: string
      email:
        type: string
    required:
    - code
    - device_name
    - email
    type: object
  handler.activateRequest:
    properties:
      confirm_password:
        type: string
      password:
        type: string
      token:
        type: string
    required:
    - confirm_password
    - password
    - token
    type: object
  handler.applyBlueprintBody:
    properties:
      target_id:
        example: 123
        type: integer
    required:
    - target_id
    type: object
  handler.applyLimitTemplateBody:
    properties:
      template_name:
        example: BasicTeller
        type: string
    required:
    - template_name
    type: object
  handler.counterOTCOfferRequest:
    properties:
      premium:
        type: string
      quantity:
        type: string
      settlement_date:
        type: string
      strike_price:
        type: string
    type: object
  handler.createAccountRequest:
    properties:
      account_category:
        type: string
      account_kind:
        type: string
      account_type:
        type: string
      card_brand:
        type: string
      company_id:
        type: integer
      create_card:
        type: boolean
      currency_code:
        type: string
      employee_id:
        type: integer
      initial_balance:
        type: number
      owner_id:
        type: integer
    required:
    - account_kind
    - account_type
    - currency_code
    - owner_id
    type: object
  handler.createAuthorizedPersonRequest:
    properties:
      account_id:
        type: integer
      address:
        type: string
      date_of_birth:
        type: integer
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      last_name:
        type: string
      phone:
        type: string
    required:
    - account_id
    - first_name
    - last_name
    type: object
  handler.createBankAccountBody:
    properties:
      account_kind:
        example: current
        type: string
      account_name:
        example: EX Banka RSD Account
        type: string
      currency_code:
        example: RSD
        type: string
    required:
    - account_kind
    - currency_code
    type: object
  handler.createBlueprintBody:
    type: object
  handler.createCardRequest:
    properties:
      account_number:
        type: string
      card_brand:
        type: string
      owner_id:
        type: integer
      owner_type:
        type: string
    required:
    - account_number
    - owner_id
    - owner_type
    type: object
  handler.createCardRequestBody:
    properties:
      account_number:
        example: 265-0000000001-00
        type: string
      card_brand:
        example: visa
        type: string
      card_name:
        example: My Visa Card
        type: string
      card_type:
        example: debit
        type: string
    required:
    - account_number
    - card_brand
    type: object
  handler.createClientRequest:
    properties:
      address:
        type: string
      date_of_birth:
        type: integer
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
    required:
    - date_of_birth
    - email
    - first_name
    - jmbg
    - last_name
    type: object
  handler.createCompanyRequest:
    properties:
      activity_code:
        type: string
      address:
        type: string
      company_name:
        type: string
      owner_id:
        type: integer
      registration_number:
        type: string
      tax_number:
        type: string
    required:
    - company_name
    - owner_id
    - registration_number
    type: object
  handler.createEmployeeRequest:
    properties:
      address:
        type: string
      date_of_birth:
        type: integer
      department:
        type: string
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        type: string
      username:
        type: string
    required:
    - date_of_birth
    - email
    - first_name
    - jmbg
    - last_name
    - role
    - username
    type: object
  handler.createFeeBody:
    properties:
      currency_code:
        example: ""
        type: string
      fee_type:
        example: percentage
        type: string
      fee_value:
        example: "0.1000"
        type: string
      max_fee:
        example: "0.0000"
        type: string
      min_amount:
        example: "1000.0000"
        type: string
      name:
        example: Standard Payment Fee
        type: string
      transaction_type:
        example: all
        type: string
    required:
    - fee_type
    - fee_value
    - name
    - transaction_type
    type: object
  handler.createFundRequest:
    properties:
      description:
        type: string
      minimum_contribution_rsd:
        type: string
      name:
        type: string
    type: object
  handler.createInterestRateTierBody:
    properties:
      amount_from:
        type: number
      amount_to:
        type: number
      fixed_rate:
        type: number
      variable_base:
        type: number
    required:
    - fixed_rate
    - variable_base
    type: object
  handler.createLimitTemplateBody:
    properties:
      description:
        example: Default teller limits
        type: string
      max_client_daily_limit:
        example: "250000.0000"
        type: string
      max_client_monthly_limit:
        example: "2500000.0000"
        type: string
      max_daily_transaction:
        example: "500000.0000"
        type: string
      max_loan_approval_amount:
        example: "50000.0000"
        type: string
      max_single_transaction:
        example: "100000.0000"
        type: string
      name:
        example: BasicTeller
        type: string
    required:
    - name
    type: object
  handler.createLoanRequestBody:
    properties:
      account_number:
        type: string
      amount:
        type: number
      client_id:
        description: |-
          ClientID is accepted from the body for backwards compatibility but silently
          ignored — the gateway always derives the client identity from the JWT user_id.
        type: integer
      currency_code:
        type: string
      employment_period:
        type: integer
      employment_status:
        type: string
      interest_type:
        type: string
      loan_type:
        type: string
      monthly_salary:
        type: number
      phone:
        type: string
      purpose:
        type: string
      repayment_period:
        type: integer
    required:
    - account_number
    - amount
    - currency_code
    - interest_type
    - loan_type
    - repayment_period
    type: object
  handler.createOTCOfferRequest:
    properties:
      counterparty_system_type:
        type: string
      counterparty_user_id:
        type: integer
      direction:
        type: string
      premium:
        type: string
      quantity:
        type: string
      settlement_date:
        type: string
      stock_id:
        type: integer
      strike_price:
        type: string
    type: object
  handler.createOptionOrderRequest:
    properties:
      account_id:
        type: integer
      all_or_none:
        type: boolean
      direction:
        type: string
      holding_id:
        type: integer
      limit_value:
        type: string
      margin:
        type: boolean
      order_type:
        type: string
      quantity:
        type: integer
      stop_value:
        type: string
    type: object
  handler.createPaymentRecipientRequest:
    properties:
      account_number:
        type: string
      client_id:
        type: integer
      recipient_name:
        type: string
    required:
    - account_number
    - client_id
    - recipient_name
    type: object
  handler.createPaymentRequest:
    properties:
      amount:
        type: number
      from_account_number:
        type: string
      payment_code:
        type: string
      payment_purpose:
        type: string
      recipient_name:
        type: string
      reference_number:
        type: string
      to_account_number:
        type: string
    required:
    - amount
    - from_account_number
    - to_account_number
    type: object
  handler.createRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
      permission_codes:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  handler.createTransferRequest:
    properties:
      amount:
        type: number
      from_account_number:
        type: string
      to_account_number:
        type: string
    required:
    - amount
    - from_account_number
    - to_account_number
    type: object
  handler.createVerificationReq:
    properties:
      method:
        type: string
      source_id:
        type: integer
      source_service:
        type: string
    required:
    - source_id
    - source_service
    type: object
  handler.createVirtualCardBody:
    properties:
      account_number:
        example: 265-0000000001-00
        type: string
      card_brand:
        example: visa
        type: string
      card_limit:
        example: "100000.0000"
        type: string
      expiry_months:
        example: 1
        type: integer
      max_uses:
        example: 1
        type: integer
      owner_id:
        description: ignored by gateway; owner is derived from JWT
        example: 1
        type: integer
      usage_type:
        example: single_use
        type: string
    required:
    - account_number
    - card_brand
    - card_limit
    - expiry_months
    - usage_type
    type: object
  handler.executePaymentRequest:
    properties:
      challenge_id:
        type: integer
      verification_code:
        type: string
    type: object
  handler.executeTransferRequest:
    properties:
      challenge_id:
        type: integer
      verification_code:
        type: string
    type: object
  handler.exerciseOptionRequest:
    properties:
      holding_id:
        type: integer
    type: object
  handler.exerciseRequest:
    properties:
      buyer_account_id:
        type: integer
      seller_account_id:
        type: integer
    type: object
  handler.investRequest:
    properties:
      amount:
        type: string
      currency:
        type: string
      on_behalf_of_type:
        type: string
      source_account_id:
        type: integer
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.logoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.passwordResetRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.previewTransferRequest:
    properties:
      amount:
        type: number
      from_account_number:
        type: string
      to_account_number:
        type: string
    required:
    - amount
    - from_account_number
    - to_account_number
    type: object
  handler.redeemRequest:
    properties:
      amount_rsd:
        type: string
      on_behalf_of_type:
        type: string
      target_account_id:
        type: integer
    type: object
  handler.refreshMobileReq:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.rejectCardRequestBody:
    properties:
      reason:
        example: Insufficient account history
        type: string
    required:
    - reason
    type: object
  handler.requestActivationReq:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.resendActivationRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.resetPasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        type: string
      token:
        type: string
    required:
    - confirm_password
    - new_password
    - token
    type: object
  handler.revokeAllSessionsRequest:
    properties:
      current_refresh_token:
        type: string
    required:
    - current_refresh_token
    type: object
  handler.revokeSessionRequest:
    properties:
      session_id:
        type: integer
    required:
    - session_id
    type: object
  handler.setBiometricsReq:
    properties:
      enabled:
        type: boolean
    type: object
  handler.setCardPinBody:
    properties:
      pin:
        example: "1234"
        type: string
    required:
    - pin
    type: object
  handler.setClientLimitsBody:
    properties:
      daily_limit:
        example: "100000.0000"
        type: string
      monthly_limit:
        example: "1000000.0000"
        type: string
      transfer_limit:
        example: "50000.0000"
        type: string
    required:
    - daily_limit
    - monthly_limit
    - transfer_limit
    type: object
  handler.setEmployeeLimitsBody:
    properties:
      max_client_daily_limit:
        example: "250000.0000"
        type: string
      max_client_monthly_limit:
        example: "2500000.0000"
        type: string
      max_daily_transaction:
        example: "500000.0000"
        type: string
      max_loan_approval_amount:
        example: "50000.0000"
        type: string
      max_single_transaction:
        example: "100000.0000"
        type: string
    type: object
  handler.setEmployeePermissionsRequest:
    properties:
      permission_codes:
        items:
          type: string
        type: array
    required:
    - permission_codes
    type: object
  handler.setEmployeeRolesRequest:
    properties:
      role_names:
        items:
          type: string
        type: array
    required:
    - role_names
    type: object
  handler.submitCodeReq:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  handler.submitMobileVerificationReq:
    properties:
      response:
        type: string
    required:
    - response
    type: object
  handler.switchSourceRequest:
    properties:
      source:
        type: string
    type: object
  handler.temporaryBlockCardBody:
    properties:
      duration_hours:
        example: 24
        type: integer
      reason:
        example: Lost card
        type: string
    required:
    - duration_hours
    type: object
  handler.updateAccountLimitsRequest:
    properties:
      daily_limit:
        type: number
      monthly_limit:
        type: number
    type: object
  handler.updateAccountNameRequest:
    properties:
      client_id:
        type: integer
      new_name:
        type: string
    required:
    - new_name
    type: object
  handler.updateAccountStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  handler.updateBankMarginBody:
    properties:
      margin:
        type: number
    required:
    - margin
    type: object
  handler.updateBlueprintBody:
    type: object
  handler.updateClientRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      date_of_birth:
        type: integer
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      last_name:
        type: string
      phone:
        type: string
    type: object
  handler.updateEmployeeRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      department:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        type: string
    type: object
  handler.updateFeeBody:
    properties:
      active:
        example: true
        type: boolean
      currency_code:
        example: RSD
        type: string
      fee_type:
        example: percentage
        type: string
      fee_value:
        example: "0.2000"
        type: string
      max_fee:
        example: "1000.0000"
        type: string
      min_amount:
        example: "500.0000"
        type: string
      name:
        example: Updated Fee
        type: string
      transaction_type:
        example: payment
        type: string
    type: object
  handler.updateFundRequest:
    properties:
      active:
        type: boolean
      description:
        type: string
      minimum_contribution_rsd:
        type: string
      name:
        type: string
    type: object
  handler.updateInterestRateTierBody:
    properties:
      amount_from:
        type: number
      amount_to:
        type: number
      fixed_rate:
        type: number
      variable_base:
        type: number
    required:
    - fixed_rate
    - variable_base
    type: object
  handler.updatePaymentRecipientRequest:
    properties:
      account_number:
        type: string
      recipient_name:
        type: string
    type: object
  handler.updateRolePermissionsRequest:
    properties:
      permission_codes:
        items:
          type: string
        type: array
    required:
    - permission_codes
    type: object
  handler.verifyCardPinBody:
    properties:
      pin:
        example: "1234"
        type: string
    required:
    - pin
    type: object
host: localhost:8080
info:
  contact: {}
  description: EXBanka Banking Microservices API Gateway. All endpoints below are
    served under /api/v2. A v1 surface remains available at /api/v1 with identical
    semantics.
  title: EXBanka API
  version: "2.0"
paths:
  /api/v1/actuaries/performance:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Actuary performance — realised profit by acting employee
      tags:
      - InvestmentFunds
  /api/v1/investment-funds:
    get:
      parameters:
      - description: page (default 1)
        in: query
        name: page
        type: integer
      - description: page size (default 20)
        in: query
        name: page_size
        type: integer
      - description: case-insensitive name substring
        in: query
        name: search
        type: string
      - description: filter to active funds
        in: query
        name: active_only
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List investment funds
      tags:
      - InvestmentFunds
    post:
      consumes:
      - application/json
      description: Supervisor or admin creates a fund. Triggers an account-service
        call to provision the fund's RSD account.
      parameters:
      - description: fund details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createFundRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a new investment fund
      tags:
      - InvestmentFunds
  /api/v1/investment-funds/{id}:
    get:
      parameters:
      - description: fund id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get investment fund detail
      tags:
      - InvestmentFunds
    put:
      consumes:
      - application/json
      parameters:
      - description: fund id
        in: path
        name: id
        required: true
        type: integer
      - description: fields to change (omitted = unchanged)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateFundRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update an investment fund
      tags:
      - InvestmentFunds
  /api/v1/investment-funds/{id}/invest:
    post:
      consumes:
      - application/json
      parameters:
      - description: fund id
        in: path
        name: id
        required: true
        type: integer
      - description: invest payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.investRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Invest in an investment fund
      tags:
      - InvestmentFunds
  /api/v1/investment-funds/{id}/redeem:
    post:
      consumes:
      - application/json
      parameters:
      - description: fund id
        in: path
        name: id
        required: true
        type: integer
      - description: redeem payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.redeemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Redeem from an investment fund
      tags:
      - InvestmentFunds
  /api/v1/investment-funds/positions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List the bank's investment-fund positions
      tags:
      - InvestmentFunds
  /api/v1/me/investment-funds:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List the caller's investment-fund positions
      tags:
      - InvestmentFunds
  /api/v2/accounts:
    get:
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: page_size
        type: integer
      - description: Filter by account name
        in: query
        name: name_filter
        type: string
      - description: Filter by account number
        in: query
        name: account_number_filter
        type: string
      - description: Filter by account type
        in: query
        name: type_filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List accounts
      tags:
