      parameters:
      - description: Activation token and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.activateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Activate account
      tags:
      - auth
  /api/auth/client-login:
