basePath: /
definitions:
  handler.CalculateExchangeRequest:
    properties:
      amount:
        example: "100.00"
        type: string
      fromCurrency:
        example: EUR
        type: string
      toCurrency:
        example: USD
        type: string
    required:
    - amount
    - fromCurrency
    - toCurrency
    type: object
  handler.activateRequest:
    properties:
      confirm_password:
        type: string
      password:
        type: string
      token:
        type: string
    required:
    - confirm_password
    - password
    - token
    type: object
  handler.applyLimitTemplateBody:
    properties:
      template_name:
        example: BasicTeller
        type: string
    required:
    - template_name
    type: object
  handler.bootstrapRequest:
    properties:
      email:
        type: string
      secret:
        type: string
    required:
    - email
    - secret
    type: object
  handler.createAccountRequest:
    properties:
      account_category:
        type: string
      account_kind:
        type: string
      account_type:
        type: string
      card_brand:
        type: string
      company_id:
        type: integer
      create_card:
        type: boolean
      currency_code:
        type: string
      employee_id:
        type: integer
      initial_balance:
        type: number
      owner_id:
        type: integer
    required:
    - account_kind
    - account_type
    - currency_code
    - owner_id
    type: object
  handler.createAuthorizedPersonRequest:
    properties:
      account_id:
        type: integer
      address:
        type: string
      date_of_birth:
        type: integer
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      last_name:
        type: string
      phone:
        type: string
    required:
    - account_id
    - first_name
    - last_name
    type: object
  handler.createBankAccountBody:
    properties:
      account_kind:
        example: current
        type: string
      account_name:
        example: EX Banka RSD Account
        type: string
      currency_code:
        example: RSD
        type: string
    required:
    - account_kind
    - currency_code
    type: object
  handler.createCardRequest:
    properties:
      account_number:
        type: string
      card_brand:
        type: string
      owner_id:
        type: integer
      owner_type:
        type: string
    required:
    - account_number
    - owner_id
    - owner_type
    type: object
  handler.createCardRequestBody:
    properties:
      account_number:
        example: 265-0000000001-00
        type: string
      card_brand:
        example: visa
        type: string
      card_name:
        example: My Visa Card
        type: string
      card_type:
        example: debit
        type: string
    required:
    - account_number
    - card_brand
    type: object
  handler.createClientRequest:
    properties:
      address:
        type: string
      date_of_birth:
        type: integer
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
    required:
    - date_of_birth
    - email
    - first_name
    - jmbg
    - last_name
    type: object
  handler.createCompanyRequest:
    properties:
      activity_code:
        type: string
      address:
        type: string
      company_name:
        type: string
      owner_id:
        type: integer
      registration_number:
        type: string
      tax_number:
        type: string
    required:
    - company_name
    - owner_id
    - registration_number
    type: object
  handler.createEmployeeRequest:
    properties:
      address:
        type: string
      date_of_birth:
        type: integer
      department:
        type: string
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        type: string
      username:
        type: string
    required:
    - date_of_birth
    - email
    - first_name
    - jmbg
    - last_name
    - role
    - username
    type: object
  handler.createFeeBody:
    properties:
      currency_code:
        example: ""
        type: string
      fee_type:
        example: percentage
        type: string
      fee_value:
        example: "0.1000"
        type: string
      max_fee:
        example: "0.0000"
        type: string
      min_amount:
        example: "1000.0000"
        type: string
      name:
        example: Standard Payment Fee
        type: string
      transaction_type:
        example: all
        type: string
    required:
    - fee_type
    - fee_value
    - name
    - transaction_type
    type: object
  handler.createInterestRateTierBody:
    properties:
      amount_from:
        type: number
      amount_to:
        type: number
      fixed_rate:
        type: number
      variable_base:
        type: number
    required:
    - fixed_rate
    - variable_base
    type: object
  handler.createLimitTemplateBody:
    properties:
      description:
        example: Default teller limits
        type: string
      max_client_daily_limit:
        example: "250000.0000"
        type: string
      max_client_monthly_limit:
        example: "2500000.0000"
        type: string
      max_daily_transaction:
        example: "500000.0000"
        type: string
      max_loan_approval_amount:
        example: "50000.0000"
        type: string
      max_single_transaction:
        example: "100000.0000"
        type: string
      name:
        example: BasicTeller
        type: string
    required:
    - name
    type: object
  handler.createLoanRequestBody:
    properties:
      account_number:
        type: string
      amount:
        type: number
      client_id:
        type: integer
      currency_code:
        type: string
      employment_period:
        type: integer
      employment_status:
        type: string
      interest_type:
        type: string
      loan_type:
        type: string
      monthly_salary:
        type: number
      phone:
        type: string
      purpose:
        type: string
      repayment_period:
        type: integer
    required:
    - account_number
    - amount
    - client_id
    - currency_code
    - interest_type
    - loan_type
    - repayment_period
    type: object
  handler.createPaymentRecipientRequest:
    properties:
      account_number:
        type: string
      client_id:
        type: integer
      recipient_name:
        type: string
    required:
    - account_number
    - client_id
    - recipient_name
    type: object
  handler.createPaymentRequest:
    properties:
      amount:
        type: number
      from_account_number:
        type: string
      payment_code:
        type: string
      payment_purpose:
        type: string
      recipient_name:
        type: string
      reference_number:
        type: string
      to_account_number:
        type: string
    required:
    - amount
    - from_account_number
    - to_account_number
    type: object
  handler.createRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
      permission_codes:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  handler.createTransferRequest:
    properties:
      amount:
        type: number
      from_account_number:
        type: string
      to_account_number:
        type: string
    required:
    - amount
    - from_account_number
    - to_account_number
    type: object
  handler.createVirtualCardBody:
    properties:
      account_number:
        example: 265-0000000001-00
        type: string
      card_brand:
        example: visa
        type: string
      card_limit:
        example: "100000.0000"
        type: string
      expiry_months:
        example: 1
        type: integer
      max_uses:
        example: 1
        type: integer
      owner_id:
        example: 1
        type: integer
      usage_type:
        example: single_use
        type: string
    required:
    - account_number
    - card_brand
    - card_limit
    - expiry_months
    - owner_id
    - usage_type
    type: object
  handler.executePaymentRequest:
    properties:
      verification_code:
        type: string
    required:
    - verification_code
    type: object
  handler.executeTransferRequest:
    properties:
      verification_code:
        type: string
    required:
    - verification_code
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.logoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.passwordResetRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.rejectCardRequestBody:
    properties:
      reason:
        example: Insufficient account history
        type: string
    required:
    - reason
    type: object
  handler.resetPasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        type: string
      token:
        type: string
    required:
    - confirm_password
    - new_password
    - token
    type: object
  handler.setCardPinBody:
    properties:
      pin:
        example: "1234"
        type: string
    required:
    - pin
    type: object
  handler.setClientLimitsBody:
    properties:
      daily_limit:
        example: "100000.0000"
        type: string
      monthly_limit:
        example: "1000000.0000"
        type: string
      transfer_limit:
        example: "50000.0000"
        type: string
    required:
    - daily_limit
    - monthly_limit
    - transfer_limit
    type: object
  handler.setEmployeeLimitsBody:
    properties:
      max_client_daily_limit:
        example: "250000.0000"
        type: string
      max_client_monthly_limit:
        example: "2500000.0000"
        type: string
      max_daily_transaction:
        example: "500000.0000"
        type: string
      max_loan_approval_amount:
        example: "50000.0000"
        type: string
      max_single_transaction:
        example: "100000.0000"
        type: string
    type: object
  handler.setEmployeePermissionsRequest:
    properties:
      permission_codes:
        items:
          type: string
        type: array
    required:
    - permission_codes
    type: object
  handler.setEmployeeRolesRequest:
    properties:
      role_names:
        items:
          type: string
        type: array
    required:
    - role_names
    type: object
  handler.temporaryBlockCardBody:
    properties:
      duration_hours:
        example: 24
        type: integer
      reason:
        example: Lost card
        type: string
    required:
    - duration_hours
    type: object
  handler.updateAccountLimitsRequest:
    properties:
      daily_limit:
        type: number
      monthly_limit:
        type: number
    type: object
  handler.updateAccountNameRequest:
    properties:
      client_id:
        type: integer
      new_name:
        type: string
    required:
    - new_name
    type: object
  handler.updateAccountStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  handler.updateBankMarginBody:
    properties:
      margin:
        type: number
    required:
    - margin
    type: object
  handler.updateClientRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      date_of_birth:
        type: integer
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      last_name:
        type: string
      phone:
        type: string
    type: object
  handler.updateEmployeeRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      department:
        type: string
      gender:
        type: string
      jmbg:
        type: string
      last_name:
        type: string
      phone:
        type: string
      position:
        type: string
      role:
        type: string
    type: object
  handler.updateFeeBody:
    properties:
      active:
        example: true
        type: boolean
      currency_code:
        example: RSD
        type: string
      fee_type:
        example: percentage
        type: string
      fee_value:
        example: "0.2000"
        type: string
      max_fee:
        example: "1000.0000"
        type: string
      min_amount:
        example: "500.0000"
        type: string
      name:
        example: Updated Fee
        type: string
      transaction_type:
        example: payment
        type: string
    type: object
  handler.updateInterestRateTierBody:
    properties:
      amount_from:
        type: number
      amount_to:
        type: number
      fixed_rate:
        type: number
      variable_base:
        type: number
    required:
    - fixed_rate
    - variable_base
    type: object
  handler.updatePaymentRecipientRequest:
    properties:
      account_number:
        type: string
      recipient_name:
        type: string
    type: object
  handler.updateRolePermissionsRequest:
    properties:
      permission_codes:
        items:
          type: string
        type: array
    required:
    - permission_codes
    type: object
  handler.verifyCardPinBody:
    properties:
      pin:
        example: "1234"
        type: string
    required:
    - pin
    type: object
host: localhost:8080
info:
  contact: {}
  description: EXBanka Banking Microservices API Gateway
  title: EXBanka API
  version: "1.0"
paths:
  /api/accounts:
    get:
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: page_size
        type: integer
      - description: Filter by account name
        in: query
        name: name_filter
        type: string
      - description: Filter by account number
        in: query
        name: account_number_filter
        type: string
      - description: Filter by account type
        in: query
        name: type_filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Creates a new bank account for a client. Requires accounts.create
        permission.
      parameters:
      - description: Account data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create account
      tags:
      - accounts
  /api/accounts/{id}:
    get:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get account by ID
      tags:
      - accounts
  /api/accounts/{id}/limits:
    put:
      consumes:
      - application/json
      description: Updates the daily/monthly/transfer limits for a bank account. Requires
        accounts.update permission.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: Limit values
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateAccountLimitsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update account limits
      tags:
      - accounts
  /api/accounts/{id}/name:
    put:
      consumes:
      - application/json
      description: Updates the display name of a bank account. Requires accounts.update
        permission.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: New name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateAccountNameRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update account name
      tags:
      - accounts
  /api/accounts/{id}/status:
    put:
      consumes:
      - application/json
      description: Updates the active/inactive status of a bank account. Requires
        accounts.update permission.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: New status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateAccountStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update account status
      tags:
      - accounts
  /api/accounts/by-number/{account_number}:
    get:
      parameters:
      - description: Account number
        in: path
        name: account_number
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get account by number
      tags:
      - accounts
  /api/accounts/client/{client_id}:
    get:
      parameters:
      - description: Client ID
        in: path
        name: client_id
        required: true
        type: integer
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List accounts by client
      tags:
      - accounts
  /api/auth/activate:
    post:
      consumes:
      - application/json
      description: Activate a new account using the token from the activation email
        link
      parameters:
      - description: Activation token and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.activateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Activate account
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password, returns access and refresh
        tokens
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: access_token, refresh_token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke the refresh token to end the session
      parameters:
      - description: Refresh token to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.logoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success message
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout
      tags:
      - auth
  /api/auth/password/reset:
    post:
      consumes:
      - application/json
      description: Reset password using a token from the reset email link
      parameters:
      - description: Reset token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.resetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reset password
      tags:
      - auth
  /api/auth/password/reset-request:
    post:
      consumes:
      - application/json
      description: Send a password reset link to the user's email
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.passwordResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: confirmation message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: error message
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Request password reset
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new access/refresh token pair
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: access_token, refresh_token
          schema:
            additionalProperties:
              type: string
