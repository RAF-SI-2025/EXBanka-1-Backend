}

// --- Forex ---

message ForexPairItem {
  uint64 id = 1;
  string ticker = 2;
  string name = 3;
  string base_currency = 4;
  string quote_currency = 5;
  string exchange_rate = 6;
  string liquidity = 7;
  int64 contract_size = 8;
  ListingInfo listing = 9;
}

message ForexPairDetail {
  uint64 id = 1;
  string ticker = 2;
  string name = 3;
  string base_currency = 4;
  string quote_currency = 5;
  string exchange_rate = 6;
  string liquidity = 7;
  int64 contract_size = 8;
  string maintenance_margin = 9;
  ListingInfo listing = 10;
}

message ListForexPairsRequest {
  string search = 1;
  string base_currency = 2;
  string quote_currency = 3;
  string liquidity = 4;
  string sort_by = 5;
  string sort_order = 6;
  int32 page = 7;
  int32 page_size = 8;
}

message ListForexPairsResponse {
  repeated ForexPairItem forex_pairs = 1;
  int64 total_count = 2;
}

message GetForexPairRequest {
  uint64 id = 1;
}

// --- Options ---

message OptionItem {
  uint64 id = 1;
  string ticker = 2;
  string name = 3;
  string stock_ticker = 4;
  uint64 stock_listing_id = 5;
  string option_type = 6;
  string strike_price = 7;
  string implied_volatility = 8;
  string premium = 9;
  int64 open_interest = 10;
  string settlement_date = 11;
  int64 contract_size = 12;
  string initial_margin_cost = 13;
  optional uint64 listing_id = 14;
}

message OptionDetail {
  uint64 id = 1;
  string ticker = 2;
  string name = 3;
  string stock_ticker = 4;
  uint64 stock_listing_id = 5;
  string option_type = 6;
  string strike_price = 7;
  string implied_volatility = 8;
  string premium = 9;
  int64 open_interest = 10;
  string settlement_date = 11;
  int64 contract_size = 12;
  string maintenance_margin = 13;
  string initial_margin_cost = 14;
  optional uint64 listing_id = 15;
}

message ListOptionsRequest {
  uint64 stock_id = 1;
  string option_type = 2;
  string settlement_date = 3;
  string min_strike = 4;
  string max_strike = 5;
  int32 page = 6;
  int32 page_size = 7;
}

message ListOptionsResponse {
  repeated OptionItem options = 1;
  int64 total_count = 2;
}

message GetOptionRequest {
  uint64 id = 1;
}

// ==================== Candles ====================

message GetCandlesRequest {
  uint64 listing_id = 1;
  string interval = 2;    // 1m, 5m, 15m, 1h, 4h, 1d
  string from = 3;        // RFC3339 timestamp
  string to = 4;          // RFC3339 timestamp
}

message CandlePoint {
  string timestamp = 1;   // RFC3339
  string open = 2;
  string high = 3;
  string low = 4;
  string close = 5;
  int64 volume = 6;
}

message GetCandlesResponse {
  repeated CandlePoint candles = 1;
  int64 count = 2;
}

// ==================== Orders ====================

service OrderGRPCService {
  rpc CreateOrder(CreateOrderRequest) returns (Order);
  rpc GetOrder(GetOrderRequest) returns (OrderDetail);
  rpc ListMyOrders(ListMyOrdersRequest) returns (ListOrdersResponse);
  rpc CancelOrder(CancelOrderRequest) returns (Order);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc ApproveOrder(ApproveOrderRequest) returns (Order);
  rpc DeclineOrder(DeclineOrderRequest) returns (Order);
}

message Order {
  uint64 id = 1;
  uint64 user_id = 2;
  uint64 listing_id = 3;
  uint64 holding_id = 4;
  string security_type = 5;
  string ticker = 6;
  string direction = 7;
  string order_type = 8;
  int64 quantity = 9;
  int64 contract_size = 10;
  string price_per_unit = 11;
  string approximate_price = 12;
  string commission = 13;
  string status = 14;
  string approved_by = 15;
  bool is_done = 16;
  int64 remaining_portions = 17;
  bool after_hours = 18;
  bool all_or_none = 19;
  bool margin = 20;
  uint64 account_id = 21;
  string last_modification = 22;
  string created_at = 23;
  optional string limit_value = 24;
  optional string stop_value = 25;
  uint64 acting_employee_id = 26;  // non-zero when the order was placed by an employee on behalf
  // Part D: computed state field derived from (status, is_done, has_fills).
  // Values: "pending" | "approved" | "filling" | "filled" | "cancelled" |
  // "declined". Raw "status" is retained for backwards compatibility.
  string state = 27;
  // filled_quantity is Quantity - RemainingPortions. Surfaced so the UI can
  // render "3 of 10 filled" without re-calling /orders/{id}.
  int64 filled_quantity = 28;
}

message OrderTransaction {
  uint64 id = 1;
  int64 quantity = 2;
  string price_per_unit = 3;
  string total_price = 4;
  string executed_at = 5;
}

message OrderDetail {
  Order order = 1;
  repeated OrderTransaction transactions = 2;
}

message CreateOrderRequest {
  uint64 user_id = 1;
  string system_type = 2;
  uint64 listing_id = 3;
  uint64 holding_id = 4;
  string direction = 5;
  string order_type = 6;
  int64 quantity = 7;
  optional string limit_value = 8;
  optional string stop_value = 9;
  bool all_or_none = 10;
  bool margin = 11;
  uint64 account_id = 12;
  uint64 acting_employee_id    = 13;  // set when an employee places on behalf of a client
  uint64 on_behalf_of_client_id = 14;  // required when acting_employee_id is set; target client
  // base_account_id is required for forex buy orders. Points at the user's
  // base-currency account that will be credited when the order fills. Ignored
  // for non-forex orders.
  optional uint64 base_account_id = 15;
  // on_behalf_of_fund_id, when non-zero, places the order against the fund's
  // RSD account; owner becomes the bank sentinel and fills credit
  // fund_holdings instead of the user's holdings. Caller must be the fund's
  // manager (or an admin). account_id must equal the fund's RSD account id.
  uint64 on_behalf_of_fund_id = 16;
}

message GetOrderRequest {
  uint64 id = 1;
  uint64 user_id = 2;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ListMyOrdersRequest {
  uint64 user_id = 1;
  string status = 2;
  string direction = 3;
  string order_type = 4;
  int32 page = 5;
  int32 page_size = 6;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ListOrdersRequest {
  string status = 1;
  string agent_email = 2;
  string direction = 3;
  string order_type = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int64 total_count = 2;
}

message CancelOrderRequest {
  uint64 id = 1;
  uint64 user_id = 2;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ApproveOrderRequest {
  uint64 id = 1;
  uint64 supervisor_id = 2;
}

message DeclineOrderRequest {
  uint64 id = 1;
  uint64 supervisor_id = 2;
}

// ==================== Portfolio ====================

service PortfolioGRPCService {
  rpc ListHoldings(ListHoldingsRequest) returns (ListHoldingsResponse);
  rpc GetPortfolioSummary(GetPortfolioSummaryRequest) returns (PortfolioSummary);
  rpc MakePublic(MakePublicRequest) returns (Holding);
  rpc ExerciseOption(ExerciseOptionRequest) returns (ExerciseResult);
  rpc ExerciseOptionByOptionID(ExerciseOptionByOptionIDRequest) returns (ExerciseResult);
  // ListHoldingTransactions returns the executed order-transactions that
  // contributed to a given holding. Since holdings aggregate per
  // (user_id, system_type, security_type, security_id) (see Part A), this
  // surfaces the full buy/sell history for that security across every
  // account the owner used.
  rpc ListHoldingTransactions(ListHoldingTransactionsRequest) returns (ListHoldingTransactionsResponse);
}

message Holding {
  uint64 id = 1;
  string security_type = 2;
  string ticker = 3;
  string name = 4;
  int64 quantity = 5;
  string average_price = 6;
  string current_price = 7;
  string profit = 8;
  int64 public_quantity = 9;
  uint64 account_id = 10;
  string last_modified = 11;
}

message ListHoldingsRequest {
  uint64 user_id = 1;
  string security_type = 2;
  int32 page = 3;
  int32 page_size = 4;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ListHoldingsResponse {
  repeated Holding holdings = 1;
  int64 total_count = 2;
}

message GetPortfolioSummaryRequest {
  uint64 user_id = 1;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message PortfolioSummary {
  // total_profit is the combined realised (lifetime, closed positions,
  // converted to RSD) + unrealised (current holdings at the native listing
  // currency) P&L. Kept for backwards compat; prefer the split fields below
  // when you need to distinguish the two. String-encoded decimal.
  string total_profit = 1;
  // total_profit_rsd is the same value as total_profit. The "_rsd" suffix is
  // historical — the unrealised half is actually native-currency. Use
  // realized_profit_lifetime_rsd + unrealized_profit fields below for clarity.
  string total_profit_rsd = 2;
  // Tax paid this calendar year, in RSD.
  string tax_paid_this_year = 3;
  // Tax owed for the current calendar month, in RSD, not yet collected.
  string tax_unpaid_this_month = 4;

  // Realised gains from closed positions (capital_gains rows) — positive
  // gains are profit, negative are losses; the sum here is net. All amounts
  // are converted to RSD via exchange-service.Convert.
  string realized_profit_this_month_rsd = 5;
  string realized_profit_this_year_rsd = 6;
  string realized_profit_lifetime_rsd = 7;

  // Unrealised gain on current holdings. Computed as (current_price −
  // average_price) × quantity per holding, summed in the listing's native
  // currency. Included so the client doesn't have to recompute, even though
  // cross-currency portfolios may blend currencies here.
  string unrealized_profit = 8;

  // Tax owed across every month, not just the current one, in RSD.
  string tax_unpaid_total_rsd = 9;

  // Number of holdings with quantity > 0.
  int64 open_positions_count = 10;

  // Number of closed trades this calendar year (count of capital_gains rows).
  int64 closed_trades_this_year = 11;
}

message MakePublicRequest {
  uint64 holding_id = 1;
  uint64 user_id = 2;
  int64 quantity = 3;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ExerciseOptionRequest {
  uint64 holding_id = 1;
  uint64 user_id = 2;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ExerciseOptionByOptionIDRequest {
  uint64 option_id  = 1;
  uint64 user_id    = 2;
  uint64 holding_id = 3; // optional; 0 means auto-resolve
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ExerciseResult {
  uint64 id = 1;
  string option_ticker = 2;
  int64 exercised_quantity = 3;
  int64 shares_affected = 4;
  string profit = 5;
}

// HoldingTransaction is one executed order-transaction that touched a holding.
// Populated from model.OrderTransaction plus lookup fields from the parent
// Order. Post-Part-A (rollup) these can span multiple accounts for the same
// holding, so account_id is returned per row for audit purposes.
message HoldingTransaction {
  uint64 id = 1;                 // order_transactions.id
  uint64 order_id = 2;
  string executed_at = 3;        // RFC3339
  string direction = 4;          // "buy" | "sell"
  int64  quantity = 5;
  string price_per_unit = 6;
  string native_amount = 7;
  string native_currency = 8;
  string converted_amount = 9;
  string account_currency = 10;
  string fx_rate = 11;
  string commission = 12;
  uint64 account_id = 13;
  string ticker = 14;
}

message ListHoldingTransactionsRequest {
  uint64 holding_id = 1;
  uint64 user_id    = 2;
  string system_type = 3;        // "client" | "employee"
  string direction  = 4;         // "" | "buy" | "sell"
  int32  page       = 5;
  int32  page_size  = 6;
}

message ListHoldingTransactionsResponse {
  repeated HoldingTransaction transactions = 1;
  int64 total_count = 2;
}

// ==================== OTC Trading ====================

service OTCGRPCService {
  rpc ListOffers(ListOTCOffersRequest) returns (ListOTCOffersResponse);
  rpc BuyOffer(BuyOTCOfferRequest) returns (OTCTransaction);
}

message OTCOffer {
  uint64 id = 1;
  uint64 seller_id = 2;
  string seller_name = 3;
  string security_type = 4;
  string ticker = 5;
  string name = 6;
  int64 quantity = 7;
  string price_per_unit = 8;
  string created_at = 9;
}

message ListOTCOffersRequest {
  string security_type = 1;
  string ticker = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListOTCOffersResponse {
  repeated OTCOffer offers = 1;
  int64 total_count = 2;
}

message BuyOTCOfferRequest {
  uint64 offer_id = 1;
  uint64 buyer_id = 2;
  string system_type = 3;
  int64 quantity = 4;
  uint64 account_id = 5;
  uint64 acting_employee_id    = 6;
  uint64 on_behalf_of_client_id = 7;
}

message OTCTransaction {
  uint64 id = 1;
  uint64 offer_id = 2;
  int64 quantity = 3;
  string price_per_unit = 4;
  string total_price = 5;
  string commission = 6;
}

// ==================== Tax ====================

service TaxGRPCService {
  rpc ListTaxRecords(ListTaxRecordsRequest) returns (ListTaxRecordsResponse);
  rpc CollectTax(CollectTaxRequest) returns (CollectTaxResponse);
  rpc ListUserTaxRecords(ListUserTaxRecordsRequest) returns (ListUserTaxRecordsResponse);
}

message TaxRecord {
  uint64 user_id = 1;
  string user_type = 2;
  string first_name = 3;
  string last_name = 4;
  string total_debt_rsd = 5;
  string last_collection = 6;
}

message ListTaxRecordsRequest {
  string user_type = 1;
  string search = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListTaxRecordsResponse {
  repeated TaxRecord tax_records = 1;
  int64 total_count = 2;
}

message CollectTaxRequest {}

message CollectTaxResponse {
  int64 collected_count = 1;
  string total_collected_rsd = 2;
  int64 failed_count = 3;
}

message ListUserTaxRecordsRequest {
  uint64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message UserTaxRecord {
  uint64 id = 1;
  string security_type = 2;
  string ticker = 3;
  int64 quantity = 4;
  string buy_price_per_unit = 5;
  string sell_price_per_unit = 6;
  string total_gain = 7;
  string currency = 8;
  int32 tax_year = 9;
  int32 tax_month = 10;
  string created_at = 11;
}

message ListUserTaxRecordsResponse {
  repeated UserTaxRecord records = 1;
  int64 total_count = 2;
  string tax_paid_this_year = 3;
  string tax_unpaid_this_month = 4;
  // collections lists when capital-gains tax was actually taken from this
  // user's accounts (one row per per-account-currency-month collection).
  repeated TaxCollectionRecord collections = 5;
}

// TaxCollectionRecord surfaces one row from the tax_collections table so the
// owner can see exactly when tax was collected, from which account, and how
// much was converted into RSD.
message TaxCollectionRecord {
  uint64 id = 1;
  int32 year = 2;
  int32 month = 3;
  uint64 account_id = 4;
  string currency = 5;
  string total_gain = 6;
  string tax_amount = 7;
  string tax_amount_rsd = 8;
  string collected_at = 9;
}

// ==================== Source Admin ====================

service SourceAdminService {
  rpc SwitchSource(SwitchSourceRequest) returns (SwitchSourceResponse);
  rpc GetSourceStatus(GetSourceStatusRequest) returns (SourceStatus);
}

message SwitchSourceRequest {
  string source = 1; // "external" | "generated" | "simulator"
}

message SwitchSourceResponse {
  SourceStatus status = 1;
}

message GetSourceStatusRequest {}

message SourceStatus {
  string source     = 1; // currently active source
  string status     = 2; // "idle" | "reseeding" | "failed"
  string started_at = 3; // RFC3339 timestamp of the last switch
  string last_error = 4; // populated when status=failed
}

// ==================== Investment Funds (Celina 4) ====================

service InvestmentFundService {
  rpc CreateFund(CreateFundRequest) returns (FundResponse);
  rpc ListFunds(ListFundsRequest) returns (ListFundsResponse);
  rpc GetFund(GetFundRequest) returns (FundDetailResponse);
  rpc UpdateFund(UpdateFundRequest) returns (FundResponse);

  rpc InvestInFund(InvestInFundRequest) returns (ContributionResponse);
  rpc RedeemFromFund(RedeemFromFundRequest) returns (ContributionResponse);

  rpc ListMyPositions(ListMyPositionsRequest) returns (ListPositionsResponse);
  rpc ListBankPositions(ListBankPositionsRequest) returns (ListPositionsResponse);
  rpc GetActuaryPerformance(GetActuaryPerformanceRequest) returns (GetActuaryPerformanceResponse);
}

message OnBehalfOf {
  string type = 1;        // "self" | "bank" | "fund"
  uint64 fund_id = 2;     // required when type == "fund"
}

message CreateFundRequest {
  int64 actor_employee_id = 1;
  string name = 2;
  string description = 3;
  string minimum_contribution_rsd = 4;
}

message FundResponse {
  uint64 id = 1;
  string name = 2;
  string description = 3;
  int64  manager_employee_id = 4;
  string manager_full_name = 5;
  string minimum_contribution_rsd = 6;
  uint64 rsd_account_id = 7;
  string rsd_account_number = 8;
  bool   active = 9;
  string created_at = 10;
  string updated_at = 11;
  string value_rsd = 12;
  string liquid_rsd = 13;
  string profit_rsd = 14;
}

message ListFundsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
  bool   active_only = 4;
}
message ListFundsResponse {
  repeated FundResponse funds = 1;
  int64 total = 2;
}

message GetFundRequest { uint64 fund_id = 1; }
message FundDetailResponse {
  FundResponse fund = 1;
  repeated FundHoldingItem holdings = 2;
}
message FundHoldingItem {
  string security_type = 1;
  uint64 security_id = 2;
  string ticker = 3;
  int64  quantity = 4;
  string average_price_rsd = 5;
  string current_price_rsd = 6;
  string acquired_at = 7;
}

message UpdateFundRequest {
  int64  actor_employee_id = 1;
  uint64 fund_id = 2;
  string name = 3;
  string description = 4;
  string minimum_contribution_rsd = 5;
  bool   active = 6;
  bool   active_set = 7;
}

message InvestInFundRequest {
  uint64 fund_id = 1;
  uint64 actor_user_id = 2;
  string actor_system_type = 3;
  uint64 source_account_id = 4;
  string amount = 5;
  string currency = 6;
  OnBehalfOf on_behalf_of = 7;
}
message RedeemFromFundRequest {
  uint64 fund_id = 1;
  uint64 actor_user_id = 2;
  string actor_system_type = 3;
  string amount_rsd = 4;
  uint64 target_account_id = 5;
  OnBehalfOf on_behalf_of = 6;
}

message ContributionResponse {
  uint64 id = 1;
  uint64 fund_id = 2;
  string direction = 3;
  string amount_native = 4;
  string native_currency = 5;
  string amount_rsd = 6;
  string fx_rate = 7;
  string fee_rsd = 8;
  string status = 9;
  uint64 saga_id = 10;
}

message ListMyPositionsRequest {
  uint64 actor_user_id = 1;
  string actor_system_type = 2;
}
message ListBankPositionsRequest {}
message ListPositionsResponse {
  repeated PositionItem positions = 1;
}
message PositionItem {
  uint64 fund_id = 1;
  string fund_name = 2;
  string manager_full_name = 3;
  string contribution_rsd = 4;
  string percentage_fund = 5;
  string current_value_rsd = 6;
  string profit_rsd = 7;
  string last_changed_at = 8;
}

message GetActuaryPerformanceRequest {}
message GetActuaryPerformanceResponse {
  repeated ActuaryPerformance actuaries = 1;
}
message ActuaryPerformance {
  int64  employee_id = 1;
  string full_name = 2;
  string role = 3;
  string realized_profit_rsd = 4;
}

// ==================== Intra-bank OTC Options (Spec 2) ====================

service OTCOptionsService {
  rpc CreateOffer(CreateOTCOfferRequest)   returns (OTCOfferResponse);
  rpc ListMyOffers(ListMyOTCOffersRequest) returns (ListMyOTCOffersResponse);
  rpc GetOffer(GetOTCOfferRequest)         returns (OTCOfferDetailResponse);
  rpc CounterOffer(CounterOTCOfferRequest) returns (OTCOfferResponse);
  rpc AcceptOffer(AcceptOTCOfferRequest)   returns (AcceptOfferResponse);
  rpc RejectOffer(RejectOTCOfferRequest)   returns (OTCOfferResponse);

  rpc ListMyContracts(ListMyContractsRequest)   returns (ListContractsResponse);
  rpc GetContract(GetContractRequest)           returns (OptionContractResponse);
  rpc ExerciseContract(ExerciseContractRequest) returns (ExerciseResponse);
}

message PartyRef {
  int64  user_id = 1;
  string system_type = 2;
  string display_name = 3;
  string bank_code = 4;
}

message CreateOTCOfferRequest {
  int64  actor_user_id = 1;
  string actor_system_type = 2;
  string direction = 3;
  uint64 stock_id = 4;
  string quantity = 5;
  string strike_price = 6;
  string premium = 7;
  string settlement_date = 8;
  PartyRef counterparty = 9;
}

message OTCOfferResponse {
  uint64  id = 1;
  string  direction = 2;
  uint64  stock_id = 3;
  string  stock_ticker = 4;
  string  quantity = 5;
  string  strike_price = 6;
  string  premium = 7;
  string  settlement_date = 8;
  string  status = 9;
  PartyRef initiator = 10;
  PartyRef counterparty = 11;
  PartyRef last_modified_by = 12;
  string  market_reference_price = 13;
  string  created_at = 14;
  string  updated_at = 15;
  int64   version = 16;
  bool    unread = 17;
}

message OTCOfferRevisionItem {
  int32  revision_number = 1;
  string quantity = 2;
  string strike_price = 3;
  string premium = 4;
  string settlement_date = 5;
  string action = 6;
  PartyRef modified_by = 7;
  string created_at = 8;
}

message OTCOfferDetailResponse {
  OTCOfferResponse offer = 1;
  repeated OTCOfferRevisionItem revisions = 2;
}

message ListMyOTCOffersRequest {
  int64  actor_user_id = 1;
  string actor_system_type = 2;
  string role = 3;
  repeated string statuses = 4;
  uint64 stock_id = 5;
  int32  page = 6;
  int32  page_size = 7;
}
message ListMyOTCOffersResponse {
  repeated OTCOfferResponse offers = 1;
  int64 total = 2;
}

message GetOTCOfferRequest {
  uint64 offer_id = 1;
  int64  actor_user_id = 2;
  string actor_system_type = 3;
}

message CounterOTCOfferRequest {
  uint64 offer_id = 1;
  int64  actor_user_id = 2;
  string actor_system_type = 3;
  string quantity = 4;
  string strike_price = 5;
  string premium = 6;
  string settlement_date = 7;
}

message AcceptOTCOfferRequest {
  uint64 offer_id = 1;
  int64  actor_user_id = 2;
  string actor_system_type = 3;
}
message AcceptOfferResponse {
  uint64 offer_id = 1;
  uint64 contract_id = 2;
  string status = 3;
  string saga_id = 4;
  OptionContractResponse contract = 5;
}

message RejectOTCOfferRequest {
  uint64 offer_id = 1;
  int64  actor_user_id = 2;
  string actor_system_type = 3;
}

message OptionContractResponse {
  uint64  id = 1;
  uint64  offer_id = 2;
  uint64  stock_id = 3;
  string  stock_ticker = 4;
  string  quantity = 5;
  string  strike_price = 6;
  string  premium_paid = 7;
  string  premium_currency = 8;
  string  strike_currency = 9;
  string  settlement_date = 10;
  string  status = 11;
  PartyRef buyer = 12;
  PartyRef seller = 13;
  string  market_reference_price = 14;
  string  premium_paid_at = 15;
  string  exercised_at = 16;
  string  expired_at = 17;
  string  created_at = 18;
  string  updated_at = 19;
  int64   version = 20;
}

message ListMyContractsRequest {
  int64  actor_user_id = 1;
  string actor_system_type = 2;
  string role = 3;
  repeated string statuses = 4;
  int32  page = 5;
  int32  page_size = 6;
}
message ListContractsResponse {
  repeated OptionContractResponse contracts = 1;
  int64 total = 2;
}

message GetContractRequest {
  uint64 contract_id = 1;
  int64  actor_user_id = 2;
  string actor_system_type = 3;
}

message ExerciseContractRequest {
  uint64 contract_id = 1;
  int64  actor_user_id = 2;
  string actor_system_type = 3;
}
message ExerciseResponse {
  uint64 contract_id = 1;
  string status = 2;
  string saga_id = 3;
  string strike_amount_seller_ccy = 4;
  string strike_amount_buyer_ccy = 5;
  string ccy_rate_used = 6;
  string seller_currency = 7;
  string buyer_currency = 8;
  string shares_transferred = 9;
}
