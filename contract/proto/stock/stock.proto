}

message GetFuturesRequest {
  uint64 id = 1;
}

// --- Forex ---

message ForexPairItem {
  uint64 id = 1;
  string ticker = 2;
  string name = 3;
  string base_currency = 4;
  string quote_currency = 5;
  string exchange_rate = 6;
  string liquidity = 7;
  int64 contract_size = 8;
  ListingInfo listing = 9;
}

message ForexPairDetail {
  uint64 id = 1;
  string ticker = 2;
  string name = 3;
  string base_currency = 4;
  string quote_currency = 5;
  string exchange_rate = 6;
  string liquidity = 7;
  int64 contract_size = 8;
  string maintenance_margin = 9;
  ListingInfo listing = 10;
}

message ListForexPairsRequest {
  string search = 1;
  string base_currency = 2;
  string quote_currency = 3;
  string liquidity = 4;
  string sort_by = 5;
  string sort_order = 6;
  int32 page = 7;
  int32 page_size = 8;
}

message ListForexPairsResponse {
  repeated ForexPairItem forex_pairs = 1;
  int64 total_count = 2;
}

message GetForexPairRequest {
  uint64 id = 1;
}

// --- Options ---

message OptionItem {
  uint64 id = 1;
  string ticker = 2;
  string name = 3;
  string stock_ticker = 4;
  uint64 stock_listing_id = 5;
  string option_type = 6;
  string strike_price = 7;
  string implied_volatility = 8;
  string premium = 9;
  int64 open_interest = 10;
  string settlement_date = 11;
  int64 contract_size = 12;
  string initial_margin_cost = 13;
  optional uint64 listing_id = 14;
}

message OptionDetail {
  uint64 id = 1;
  string ticker = 2;
  string name = 3;
  string stock_ticker = 4;
  uint64 stock_listing_id = 5;
  string option_type = 6;
  string strike_price = 7;
  string implied_volatility = 8;
  string premium = 9;
  int64 open_interest = 10;
  string settlement_date = 11;
  int64 contract_size = 12;
  string maintenance_margin = 13;
  string initial_margin_cost = 14;
  optional uint64 listing_id = 15;
}

message ListOptionsRequest {
  uint64 stock_id = 1;
  string option_type = 2;
  string settlement_date = 3;
  string min_strike = 4;
  string max_strike = 5;
  int32 page = 6;
  int32 page_size = 7;
}

message ListOptionsResponse {
  repeated OptionItem options = 1;
  int64 total_count = 2;
}

message GetOptionRequest {
  uint64 id = 1;
}

// ==================== Candles ====================

message GetCandlesRequest {
  uint64 listing_id = 1;
  string interval = 2;    // 1m, 5m, 15m, 1h, 4h, 1d
  string from = 3;        // RFC3339 timestamp
  string to = 4;          // RFC3339 timestamp
}

message CandlePoint {
  string timestamp = 1;   // RFC3339
  string open = 2;
  string high = 3;
  string low = 4;
  string close = 5;
  int64 volume = 6;
}

message GetCandlesResponse {
  repeated CandlePoint candles = 1;
  int64 count = 2;
}

// ==================== Orders ====================

service OrderGRPCService {
  rpc CreateOrder(CreateOrderRequest) returns (Order);
  rpc GetOrder(GetOrderRequest) returns (OrderDetail);
  rpc ListMyOrders(ListMyOrdersRequest) returns (ListOrdersResponse);
  rpc CancelOrder(CancelOrderRequest) returns (Order);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc ApproveOrder(ApproveOrderRequest) returns (Order);
  rpc DeclineOrder(DeclineOrderRequest) returns (Order);
}

message Order {
  uint64 id = 1;
  uint64 user_id = 2;
  uint64 listing_id = 3;
  uint64 holding_id = 4;
  string security_type = 5;
  string ticker = 6;
  string direction = 7;
  string order_type = 8;
  int64 quantity = 9;
  int64 contract_size = 10;
  string price_per_unit = 11;
  string approximate_price = 12;
  string commission = 13;
  string status = 14;
  string approved_by = 15;
  bool is_done = 16;
  int64 remaining_portions = 17;
  bool after_hours = 18;
  bool all_or_none = 19;
  bool margin = 20;
  uint64 account_id = 21;
  string last_modification = 22;
  string created_at = 23;
  optional string limit_value = 24;
  optional string stop_value = 25;
  uint64 acting_employee_id = 26;  // non-zero when the order was placed by an employee on behalf
  // Part D: computed state field derived from (status, is_done, has_fills).
  // Values: "pending" | "approved" | "filling" | "filled" | "cancelled" |
  // "declined". Raw "status" is retained for backwards compatibility.
  string state = 27;
  // filled_quantity is Quantity - RemainingPortions. Surfaced so the UI can
  // render "3 of 10 filled" without re-calling /orders/{id}.
  int64 filled_quantity = 28;
}

message OrderTransaction {
  uint64 id = 1;
  int64 quantity = 2;
  string price_per_unit = 3;
  string total_price = 4;
  string executed_at = 5;
}

message OrderDetail {
  Order order = 1;
  repeated OrderTransaction transactions = 2;
}

message CreateOrderRequest {
  uint64 user_id = 1;
  string system_type = 2;
  uint64 listing_id = 3;
  uint64 holding_id = 4;
  string direction = 5;
  string order_type = 6;
  int64 quantity = 7;
  optional string limit_value = 8;
  optional string stop_value = 9;
  bool all_or_none = 10;
  bool margin = 11;
  uint64 account_id = 12;
  uint64 acting_employee_id    = 13;  // set when an employee places on behalf of a client
  uint64 on_behalf_of_client_id = 14;  // required when acting_employee_id is set; target client
  // base_account_id is required for forex buy orders. Points at the user's
  // base-currency account that will be credited when the order fills. Ignored
  // for non-forex orders.
  optional uint64 base_account_id = 15;
  // on_behalf_of_fund_id, when non-zero, places the order against the fund's
  // RSD account; owner becomes the bank sentinel and fills credit
  // fund_holdings instead of the user's holdings. Caller must be the fund's
  // manager (or an admin). account_id must equal the fund's RSD account id.
  uint64 on_behalf_of_fund_id = 16;
}

message GetOrderRequest {
  uint64 id = 1;
  uint64 user_id = 2;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ListMyOrdersRequest {
  uint64 user_id = 1;
  string status = 2;
  string direction = 3;
  string order_type = 4;
  int32 page = 5;
  int32 page_size = 6;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ListOrdersRequest {
  string status = 1;
  string agent_email = 2;
  string direction = 3;
  string order_type = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int64 total_count = 2;
}

message CancelOrderRequest {
  uint64 id = 1;
  uint64 user_id = 2;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ApproveOrderRequest {
  uint64 id = 1;
  uint64 supervisor_id = 2;
}

message DeclineOrderRequest {
  uint64 id = 1;
  uint64 supervisor_id = 2;
}

// ==================== Portfolio ====================

service PortfolioGRPCService {
  rpc ListHoldings(ListHoldingsRequest) returns (ListHoldingsResponse);
  rpc GetPortfolioSummary(GetPortfolioSummaryRequest) returns (PortfolioSummary);
  rpc MakePublic(MakePublicRequest) returns (Holding);
  rpc ExerciseOption(ExerciseOptionRequest) returns (ExerciseResult);
  rpc ExerciseOptionByOptionID(ExerciseOptionByOptionIDRequest) returns (ExerciseResult);
  // GetHolding returns one Holding by ID. Carries owner_type +
  // owner_id alongside the response so the gateway can perform the
  // CLAUDE.md ownership pre-check before calling mutating RPCs like
  // ExerciseOption / MakePublic. (Fix R5, 2026-05-16.)
  rpc GetHolding(GetHoldingRequest) returns (HoldingWithOwner);
  // ListHoldingTransactions returns the executed order-transactions that
  // contributed to a given holding. Since holdings aggregate per
  // (user_id, system_type, security_type, security_id) (see Part A), this
  // surfaces the full buy/sell history for that security across every
  // account the owner used.
  rpc ListHoldingTransactions(ListHoldingTransactionsRequest) returns (ListHoldingTransactionsResponse);
  // GetUnifiedPortfolio returns all securities holdings and fund positions for
  // one portfolio owner (client, bank, or investment fund), grouped by
  // asset class with P/L totals computed on read.
  rpc GetUnifiedPortfolio(GetUnifiedPortfolioRequest) returns (UnifiedPortfolioResponse);
}

// ── Unified Portfolio messages ──────────────────────────────────────────────

message GetUnifiedPortfolioRequest {
  string owner_type = 1; // "client" | "bank" | "investment_fund"
  uint64 owner_id   = 2; // 0 when owner_type == "bank"
}

message PortfolioPosition {
  string asset_type          = 1;  // "stock"|"option"|"future"|"investment_fund"
  string symbol              = 2;  // for stocks/options/futures
  uint64 fund_id             = 3;  // for fund positions
  string fund_name           = 4;  // for fund positions
  uint64 contract_id         = 5;  // for options/futures
  int64  quantity            = 6;
  string avg_cost_rsd        = 7;  // decimal as string
  string current_price_rsd   = 8;
  string current_value_rsd   = 9;
  string p_l_rsd             = 10;
  string p_l_pct             = 11;
  string amount_invested_rsd = 12; // fund positions
  string pct_of_fund         = 13;
  string strike_rsd          = 14;
  string premium_paid_rsd    = 15;
  string intrinsic_value_rsd = 16;
  string settlement_date     = 17;
  string last_updated        = 18;
  // E3 fields (Plan E 2026-05-28):
  // dividends_received_rsd — caller's pro-rata share of dividends paid to
  // this fund (investment_fund positions) or directly to the holder
  // (stock positions). Real value from fund_dividend_payments /
  // dividend_payouts (E4). "0" until E4 is payed out.
  string dividends_received_rsd = 19;
  // fund_status — lifecycle status of the fund (investment_fund positions only).
  // active|fundraising|matured|liquidated|open (passthrough from InvestmentFund.FundStatus).
  string fund_status            = 20;
  // holding_id — numeric id of the underlying holdings row for securities
  // positions (stock/option/future). 0/omitted for fund positions (funds are
  // keyed by fund_id, not a holding). Lets clients feed make-public/exercise,
  // which require a holding_id, straight from this response.
  uint64 holding_id             = 21;
}

message PortfolioGroup {
  string total_value_rsd           = 1;
  string total_profit_rsd          = 2;
  string total_profit_pct          = 3;
  repeated PortfolioPosition positions = 4;
}

message UnifiedPortfolioResponse {
  string         portfolio_id     = 1;
  string         owner_type       = 2;
  uint64         owner_id         = 3;
  string         owner_name       = 4;
  string         total_value_rsd  = 5;
  string         total_profit_rsd = 6;
  string         total_profit_pct = 7;
  PortfolioGroup securities       = 8;
  PortfolioGroup funds            = 9;
}

message Holding {
  uint64 id = 1;
  string security_type = 2;
  string ticker = 3;
  string name = 4;
  int64 quantity = 5;
  string average_price = 6;
  string current_price = 7;
  string profit = 8;
  int64 public_quantity = 9;
  uint64 account_id = 10;
  string last_modified = 11;
}

message ListHoldingsRequest {
  uint64 user_id = 1;
  string security_type = 2;
  int32 page = 3;
  int32 page_size = 4;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ListHoldingsResponse {
  repeated Holding holdings = 1;
  int64 total_count = 2;
}

// GetHoldingRequest / HoldingWithOwner — used by api-gateway for the
// pre-mutate ownership check (Fix R5). HoldingWithOwner is Holding +
// owner_type + owner_id so the gateway can assert the caller matches
// without doing a follow-up lookup.
message GetHoldingRequest {
  uint64 id = 1;
}
message HoldingWithOwner {
  Holding holding = 1;
  string owner_type = 2;  // "client" | "bank"
  uint64 owner_id = 3;    // 0 when owner_type=="bank"
}

message GetPortfolioSummaryRequest {
  uint64 user_id = 1;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message PortfolioSummary {
  // total_profit is the combined realised (lifetime, closed positions,
  // converted to RSD) + unrealised (current holdings at the native listing
  // currency) P&L. Kept for backwards compat; prefer the split fields below
  // when you need to distinguish the two. String-encoded decimal.
  string total_profit = 1;
  // total_profit_rsd is the same value as total_profit. The "_rsd" suffix is
  // historical — the unrealised half is actually native-currency. Use
  // realized_profit_lifetime_rsd + unrealized_profit fields below for clarity.
  string total_profit_rsd = 2;
  // Tax paid this calendar year, in RSD.
  string tax_paid_this_year = 3;
  // Tax owed for the current calendar month, in RSD, not yet collected.
  string tax_unpaid_this_month = 4;

  // Realised gains from closed positions (capital_gains rows) — positive
  // gains are profit, negative are losses; the sum here is net. All amounts
  // are converted to RSD via exchange-service.Convert.
  string realized_profit_this_month_rsd = 5;
  string realized_profit_this_year_rsd = 6;
  string realized_profit_lifetime_rsd = 7;

  // Unrealised gain on current holdings. Computed as (current_price −
  // average_price) × quantity per holding, summed in the listing's native
  // currency. Included so the client doesn't have to recompute, even though
  // cross-currency portfolios may blend currencies here.
  string unrealized_profit = 8;

  // Tax owed across every month, not just the current one, in RSD.
  string tax_unpaid_total_rsd = 9;

  // Number of holdings with quantity > 0.
  int64 open_positions_count = 10;

  // Number of closed trades this calendar year (count of capital_gains rows).
  int64 closed_trades_this_year = 11;
}

message MakePublicRequest {
  uint64 holding_id = 1;
  uint64 user_id = 2;
  int64 quantity = 3;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ExerciseOptionRequest {
  uint64 holding_id = 1;
  uint64 user_id = 2;
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ExerciseOptionByOptionIDRequest {
  uint64 option_id  = 1;
  uint64 user_id    = 2;
  uint64 holding_id = 3; // optional; 0 means auto-resolve
  // system_type is "client" or "employee" — forwarded from the JWT context
  // by api-gateway so user-scoped queries filter by (user_id, system_type)
  // and avoid cross-system-type data leaks.
  string system_type = 10;
}

message ExerciseResult {
  uint64 id = 1;
  string option_ticker = 2;
  int64 exercised_quantity = 3;
  int64 shares_affected = 4;
  string profit = 5;
}

// HoldingTransaction is one executed order-transaction that touched a holding.
// Populated from model.OrderTransaction plus lookup fields from the parent
// Order. Post-Part-A (rollup) these can span multiple accounts for the same
// holding, so account_id is returned per row for audit purposes.
message HoldingTransaction {
  uint64 id = 1;                 // order_transactions.id
  uint64 order_id = 2;
  string executed_at = 3;        // RFC3339
  string direction = 4;          // "buy" | "sell"
  int64  quantity = 5;
  string price_per_unit = 6;
  string native_amount = 7;
  string native_currency = 8;
  string converted_amount = 9;
  string account_currency = 10;
  string fx_rate = 11;
  string commission = 12;
  uint64 account_id = 13;
  string ticker = 14;
}

message ListHoldingTransactionsRequest {
  uint64 holding_id = 1;
  uint64 user_id    = 2;
  string system_type = 3;        // "client" | "employee"
  string direction  = 4;         // "" | "buy" | "sell"
  int32  page       = 5;
  int32  page_size  = 6;
}

message ListHoldingTransactionsResponse {
  repeated HoldingTransaction transactions = 1;
  int64 total_count = 2;
}

// ==================== OTC Trading ====================

service OTCGRPCService {
  rpc ListOffers(ListOTCOffersRequest) returns (ListOTCOffersResponse);
  rpc BuyOffer(BuyOTCOfferRequest) returns (OTCTransaction);
  // Unified view: local offers from this bank's holdings + remote offers
  // pulled from every active peer bank's GET /public-stock. Backed by
  // an in-process cache refreshed every ~5 s by stock-service.
  rpc ListUnifiedOffers(ListUnifiedOTCOffersRequest) returns (ListUnifiedOTCOffersResponse);
  // Phase 6: cross-bank discovery of OPEN OTC OPTION LISTINGS. Local
  // rows come from otc_offers (Phase 2 marketplace); remote rows pulled
  // every ~5 s from peer banks' GET /public-option-offers. Same partial-
  // failure tolerance as ListUnifiedOffers (peers_total / peers_reached).
  rpc ListUnifiedOptionOffers(ListUnifiedOptionOffersRequest) returns (ListUnifiedOptionOffersResponse);
}

message OTCOffer {
  uint64 id = 1;
  uint64 seller_id = 2;
  string seller_name = 3;
  string security_type = 4;
  string ticker = 5;
  string name = 6;
  int64 quantity = 7;
  string price_per_unit = 8;
  string created_at = 9;
}

message ListOTCOffersRequest {
  string security_type = 1;
  string ticker = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListOTCOffersResponse {
  repeated OTCOffer offers = 1;
  int64 total_count = 2;
}

// UnifiedOTCOffer is one entry in the cross-bank-aggregated OTC view.
// `kind` discriminates the buy flow:
//   - "local"  → buy via POST /api/v3/otc/offers/{id}/buy
//   - "remote" → buy via POST /api/v3/me/peer-otc/negotiations using
//                bank_code as seller_bank_code and owner_id as seller_id.
// Local-only fields (id, seller_id, seller_name, name, created_at) are
// zero/empty on remote offers; owner_id is empty on local offers.
message UnifiedOTCOffer {
  string kind = 1;
  string bank_code = 2;

  // Local-only
  uint64 id = 3;
  uint64 seller_id = 4;
  string seller_name = 5;
  string name = 6;
  string created_at = 7;

  // Remote-only. SI-TX owner shape: "0" means bank-owned, "1+" is a
  // client id at the seller bank.
  string owner_id = 8;

  // Common
  string security_type = 9;
  string ticker = 10;
  int64 quantity = 11;
  string price_per_unit = 12;
  string currency = 13;
}

message ListUnifiedOTCOffersRequest {
  string security_type = 1;
  string ticker = 2;
  string kind = 3;       // optional filter: "local" | "remote"
  string bank_code = 4;  // optional filter
  int32 page = 5;
  int32 page_size = 6;
}

message ListUnifiedOTCOffersResponse {
  repeated UnifiedOTCOffer offers = 1;
  int64 total_count = 2;
  int32 peers_total = 3;
  int32 peers_reached = 4;
  bool partial = 5;
  int64 last_refresh_unix = 6;
}

// Phase 6 — unified cross-bank view of open OTC OPTION listings.
// Local rows come from this bank's otc_offers (status open + counterparty
// NULL); remote rows come from peer banks' GET /public-option-offers
// pulled every ~5 s by the cache refresher.
message UnifiedOptionOffer {
  string kind             = 1;   // "local" | "remote"
  string bank_code        = 2;
  int64  routing_number   = 3;
  string offer_id         = 4;   // local: strconv(uint64); remote: foreign id
  string seller_id        = 5;   // SI-TX-prefixed: "client-<N>" | "bank"
  string seller_name      = 6;   // local-only display name; "" remote
  string direction        = 7;   // "sell_initiated" | "buy_initiated"
  string ticker           = 8;
  int64  amount           = 9;
  string strike_price     = 10;
  string strike_currency  = 11;
  string premium          = 12;
  string premium_currency = 13;
  string settlement_date  = 14;  // RFC3339 UTC
  string created_at       = 15;
  // Best-bid / best-ask surface (Part A 2026-05-16). Populated from
  // active OTCNegotiation rows (status IN open/countered). best_bid =
  // MAX(premium) on sell_initiated parents; best_ask = MIN(premium)
  // on buy_initiated parents. Empty string ⇒ no active chains (or
  // remote peer doesn't support the field — wire-compatible: older
  // peers omit it and proto3 deserializes to "" on our side).
  string best_bid             = 16;
  string best_ask             = 17;
  int32  active_chains_count  = 18;
}

message ListUnifiedOptionOffersRequest {
  string ticker    = 1;
  string kind      = 2;   // "" | "local" | "remote"
  string bank_code = 3;
  string direction = 4;   // "" | "sell_initiated" | "buy_initiated"
  int32  page      = 5;
  int32  page_size = 6;
  // owner_only_seller_id, when non-empty, filters the snapshot to local
  // listings whose SellerID exactly matches this string (SI-TX form:
  // "client-<principal_id>" for client listings, "bank" for bank-owned).
  // Used by GET /api/v3/me/otc/options to scope the marketplace view
  // to the caller's own open listings without changing the response
  // shape. Implies kind=local since cross-bank listings can never be
  // ours.
  string owner_only_seller_id = 7;
}

message ListUnifiedOptionOffersResponse {
  repeated UnifiedOptionOffer offers = 1;
  int64 total_count       = 2;
  int32 peers_total       = 3;
  int32 peers_reached     = 4;
  bool  partial           = 5;
  int64 last_refresh_unix = 6;
}

message BuyOTCOfferRequest {
  uint64 offer_id = 1;
  uint64 buyer_id = 2;
  string system_type = 3;
  int64 quantity = 4;
  uint64 account_id = 5;
  uint64 acting_employee_id    = 6;
  uint64 on_behalf_of_client_id = 7;
}

message OTCTransaction {
  uint64 id = 1;
  uint64 offer_id = 2;
  int64 quantity = 3;
  string price_per_unit = 4;
  string total_price = 5;
  string commission = 6;
}

