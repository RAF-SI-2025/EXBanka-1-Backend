// PeerOTCService backs the api-gateway /api/v3/public-stock and
// /api/v3/negotiations/{rid}/{id} routes (Phase 4, Celina 5 SI-TX).
//
// RecordOptionContract is called by transaction-service at COMMIT_TX
// time for each option-asset posting that landed on this bank — one
// call per (DEBIT-on-seller, CREDIT-on-buyer) leg. Idempotent on
// (crossbank_tx_id, posting_index).
//
// CheckSellerCanDeliver is called by transaction-service at NEW_TX
// time for each DEBIT-direction option-asset posting on this bank,
// to validate that the seller has enough unreserved shares to back
// the contract. A NO answer drives an INSUFFICIENT_ASSET NoVote so
// money never moves on a contract the seller can't fulfil.
service PeerOTCService {
  rpc GetPublicStocks(GetPublicStocksRequest) returns (GetPublicStocksResponse);
  // Phase 6: peer-facing discovery of OPEN OTC OPTION listings.
  // Returns OTCOffer rows on THIS bank where:
  //   * status is open/PENDING (legacy alias) AND
  //   * counterparty_owner_id IS NULL (undirected listings only) AND
  //   * Private==false OR PrivateToBankCode == X-Bank-Code of caller.
  // Wire shape parallels GetPublicStocks; PeerAuth via X-Api-Key.
  rpc GetPublicOptionOffers(GetPublicOptionOffersRequest) returns (GetPublicOptionOffersResponse);
  rpc CreateNegotiation(CreateNegotiationRequest) returns (CreateNegotiationResponse);
  rpc UpdateNegotiation(UpdateNegotiationRequest) returns (UpdateNegotiationResponse);
  rpc GetNegotiation(GetNegotiationRequest) returns (GetNegotiationResponse);
  rpc DeleteNegotiation(DeleteNegotiationRequest) returns (DeleteNegotiationResponse);
  rpc AcceptNegotiation(AcceptNegotiationRequest) returns (AcceptNegotiationResponse);
  rpc RecordOptionContract(RecordOptionContractRequest) returns (RecordOptionContractResponse);
  rpc CheckSellerCanDeliver(CheckSellerCanDeliverRequest) returns (CheckSellerCanDeliverResponse);
  // ReserveSellerSharesForNewTx is called by transaction-service at NEW_TX
  // (vote) time for each DEBIT-direction option-asset posting on this bank.
  // Unlike CheckSellerCanDeliver (read-only), it places a real HOLD on the
  // seller's shares keyed on the SI-TX identity (crossbank_tx_id), so the
  // shares cannot be sold between vote-YES and COMMIT_TX (Celina-5 OTC SAGA
  // step 2 "rezervacija hartija"). ok=false → INSUFFICIENT_ASSET NoVote.
  // Idempotent on crossbank_tx_id.
  rpc ReserveSellerSharesForNewTx(ReserveSellerSharesRequest) returns (ReserveSellerSharesResponse);
  // ReleaseSellerSharesForNewTx releases a vote-time share hold on ROLLBACK_TX
  // (or a partial NO mid-NEW_TX) when no contract was minted. Idempotent.
  rpc ReleaseSellerSharesForNewTx(ReleaseSellerSharesRequest) returns (ReleaseSellerSharesResponse);
  // ValidatePeerOptionMoneyLeg is called by transaction-service at NEW_TX
  // (vote) time for each option-asset posting on this bank's routing. It
  // verifies that the paired MONEY leg the sender proposes equals THIS bank's
  // own stored terms — never trusting the posting amount. For an exercise leg
  // it looks up the stored peer_option_contract by (negotiation_id, direction)
  // and requires money_amount == StrikePrice * Quantity (same currency, ticker,
  // quantity, strike). ok=false → the receiver votes NO so no money/shares move.
  // Closes the forged-strike theft (a peer crafting an exercise that delivers
  // full shares for an under-stated strike). Idempotent / read-only.
  rpc ValidatePeerOptionMoneyLeg(ValidatePeerOptionMoneyLegRequest) returns (ValidatePeerOptionMoneyLegResponse);
  rpc InitiateOptionExercise(InitiateOptionExerciseRequest) returns (InitiateOptionExerciseResponse);

  // Buyer-side mirror persistence so the buyer's bank also has a local
  // row to surface in /me/peer-otc/negotiations. Called by the gateway
  // right after the outbound POST to the seller's bank succeeds.
  rpc RecordOutboundNegotiation(RecordOutboundNegotiationRequest) returns (RecordOutboundNegotiationResponse);

  // Discovery: list pending peer negotiations for a client principal.
  // Surfaces rows where the caller is either buyer or seller; the
  // caller's bank's routing number is matched against the row's
  // buyer/seller routing (so a "buyer" row on bank B is one where
  // buyer_routing == bank-B routing AND buyer_id == "client-<N>"; a
  // "seller" row on bank A is one where seller_routing == bank-A
  // routing AND seller_id == "client-<N>").
  rpc ListMyPeerNegotiations(ListMyPeerNegotiationsRequest) returns (ListMyPeerNegotiationsResponse);

  // Local-mirror status flip to "accepted". Called by the gateway after
  // a successful proxy of POST /me/peer-otc/negotiations/.../accept to
  // the counterparty's bank, so the caller's own list reflects the
  // terminal state immediately. The peer-facing AcceptNegotiation RPC
  // (above) is reserved for the bank that actually dispatches the
  // option-formation SI-TX — calling that one twice would re-dispatch.
  rpc MarkNegotiationAccepted(MarkNegotiationAcceptedRequest) returns (MarkNegotiationAcceptedResponse);

  // Phase 10 — cross-bank cascade-cancel of sibling chains on accept.
  // Called by the seller's gateway after MarkNegotiationAccepted. The
  // RPC returns every other ongoing peer_otc_negotiations row whose
  // seller is the same AND whose offer matches the accepted offer's
  // ticker + settlement_date — those are "the same parallel-bid
  // siblings" in the user's mental model. Each match is marked
  // status=cancelled locally; the response carries (peer_bank_code,
  // foreign_id) tuples so the gateway can fire outbound DELETEs to
  // each bidder's bank to update their mirrors.
  rpc CascadeCancelSiblings(CascadeCancelSiblingsRequest) returns (CascadeCancelSiblingsResponse);
}

message CascadeCancelSiblingsRequest {
  // The negotiation that was just accepted — sets the "seller side" +
  // "offer terms" the cascade matches on. Caller passes the gateway-
  // side keys (the gateway only knows (peer_bank_code, foreign_id)
  // because that's what proxyPeerNegotiation already uses).
  string peer_bank_code = 1; // peer-bank code of the accepted chain
  string foreign_id     = 2; // foreign id of the accepted chain
}

// CascadedSibling identifies one chain that was cancelled by the
// cascade. peer_bank_code + foreign_id are the routing tuple the
// gateway uses to fire the outbound DELETE; the rest of the fields
// are a wire-shape projection of the cancelled negotiation (same
// shape as PeerNegotiationListItem) so the FE can render the
// cancelled-siblings list in the cross-bank accept response with
// the same UI it uses for /me/peer-otc/negotiations rows.
message CascadedSibling {
  string peer_bank_code = 1; // bidder's bank-code (for outbound DELETE)
  string foreign_id     = 2; // foreign id on the bidder's bank
  PeerForeignBankId buyer_id  = 3;
  PeerForeignBankId seller_id = 4;
  PeerOtcOffer      offer     = 5;
  string            status    = 6; // always "cancelled" for cascade results
  string            role      = 7; // caller's side — always "seller" (cascade fires on accept)
  string            updated_at = 8; // ISO-8601
}

message CascadeCancelSiblingsResponse {
  repeated CascadedSibling siblings = 1;
}

message MarkNegotiationAcceptedRequest {
  string peer_bank_code = 1;
  PeerForeignBankId negotiation_id = 2;
}
message MarkNegotiationAcceptedResponse {}

message RecordOutboundNegotiationRequest {
  string peer_bank_code = 1;
  PeerForeignBankId negotiation_id = 2;
  PeerForeignBankId buyer_id = 3;
  PeerForeignBankId seller_id = 4;
  PeerOtcOffer offer = 5;
}
message RecordOutboundNegotiationResponse {}

message ListMyPeerNegotiationsRequest {
  // Caller's own bank routing number. Used together with client_id to
  // determine which rows belong to the caller as buyer / seller.
  int64 own_routing_number = 1;
  // The caller's client principal id (decimal string of the JWT
  // principal_id). Server stamps it as "client-<N>" before matching
  // against buyer_id / seller_id strings.
  string client_id = 2;
  // Optional role filter: "buyer", "seller", or "" / "both".
  string role = 3;
}

message ListMyPeerNegotiationsResponse {
  repeated PeerNegotiationListItem items = 1;
}

message PeerNegotiationListItem {
  PeerForeignBankId id = 1;          // foreign id on the *other* bank
  PeerForeignBankId buyer_id = 2;
  PeerForeignBankId seller_id = 3;
  PeerOtcOffer offer = 4;
  string status = 5;
  string role = 6;                    // "buyer" or "seller" — the caller's side
  string updated_at = 7;
  // local_contract_id is the peer_option_contracts.id on this bank that
  // was minted when the negotiation reached status="accepted". 0 when
  // the negotiation is not yet accepted or no contract row exists on
  // this bank (the contract always exists on at least one bank side;
  // on the other bank it may be absent until the SI-TX commits).
  uint64 local_contract_id = 8;
}

message PeerForeignBankId {
  int64 routing_number = 1;
  string id = 2;
}

message PeerOtcOffer {
  string ticker = 1;
  int64 amount = 2;
  string price_per_stock = 3;
  string currency = 4;
  string premium = 5;
  string premium_currency = 6;
  string settlement_date = 7;
  PeerForeignBankId last_modified_by = 8;
  // Phase 10 — cross-bank cascade-cancel grouping. Bidders capture
  // this from /public-option-offers discovery and pass it through so
  // the seller bank can match siblings on accept. Optional; absent
  // value (zero routing_number + empty id) means "no parent group".
  PeerForeignBankId parent_offer_id = 9;
  // Fix #1 (2026-05-16) — the buyer's pre-bound 18-digit bank account
  // number. When set, the seller's bank uses this exact account number
  // for the buyer-debit posting on accept (no resolution from
  // "client-<id>" → "first account in this currency"). Optional for
  // backward compat with peer banks that don't emit it; falls back to
  // participant-id resolution at the receiver's posting_executor.
  string buyer_account_number = 10;
}

message GetPublicStocksRequest {
  string peer_bank_code = 1;
}

message PeerPublicStock {
  PeerForeignBankId owner_id = 1;
  string ticker = 2;
  int64 amount = 3;
  string price_per_stock = 4;
  string currency = 5;
}

message GetPublicStocksResponse {
  repeated PeerPublicStock stocks = 1;
}

// Phase 6 — discovery of open OTC OPTION listings (parallel chains
// marketplace). See docs/superpowers/plans/2026-05-16-otc-options-cross-bank.md.
message GetPublicOptionOffersRequest {
  string peer_bank_code = 1; // X-Bank-Code stamped by PeerAuth ctx
}

message PeerPublicOptionOffer {
  PeerForeignBankId offer_id        = 1;  // (own_routing, otc_offers.id stringified)
  string            ticker          = 2;
  int64             amount          = 3;
  string            strike_price    = 4;
  string            strike_currency = 5;
  string            premium         = 6;
  string            premium_currency = 7;
  string            settlement_date = 8;  // RFC3339 UTC
  PeerForeignBankId seller_id       = 9;  // SI-TX-prefixed: "client-<N>" | "bank"
  string            direction       = 10; // "sell_initiated" | "buy_initiated"
  string            created_at      = 11;
  PeerForeignBankId last_modified_by = 12;
  // Best-bid / best-ask surface (Part A 2026-05-16). STRICTLY
  // ADDITIVE: peers that don't upgrade simply omit these fields and
  // the receiver sees them as "" / 0 (proto3 default), which the
  // unified-cache projection treats as "not reported". Peers
  // publishing them populate from their own
  // OTCNegotiationRepository.AggregateActiveBidsByOffer.
  string best_bid             = 13;
  string best_ask             = 14;
  int32  active_chains_count  = 15;
}

message GetPublicOptionOffersResponse {
  repeated PeerPublicOptionOffer offers = 1;
}

message CreateNegotiationRequest {
  string peer_bank_code = 1;
  PeerOtcOffer offer = 2;
  PeerForeignBankId buyer_id = 3;
  PeerForeignBankId seller_id = 4;
}

message CreateNegotiationResponse {
  PeerForeignBankId negotiation_id = 1;
}

message UpdateNegotiationRequest {
  string peer_bank_code = 1;
  PeerForeignBankId negotiation_id = 2;
  PeerOtcOffer offer = 3;
}

message UpdateNegotiationResponse {}

message GetNegotiationRequest {
  string peer_bank_code = 1;
  PeerForeignBankId negotiation_id = 2;
}

message GetNegotiationResponse {
  PeerForeignBankId id = 1;
  PeerForeignBankId buyer_id = 2;
  PeerForeignBankId seller_id = 3;
  PeerOtcOffer offer = 4;
  string status = 5;
  string updated_at = 6;
}

message DeleteNegotiationRequest {
  string peer_bank_code = 1;
  PeerForeignBankId negotiation_id = 2;
}

message DeleteNegotiationResponse {}

message AcceptNegotiationRequest {
  string peer_bank_code = 1;
  PeerForeignBankId negotiation_id = 2;
}

message AcceptNegotiationResponse {
  string transaction_id = 1;
  string status = 2;
}

// RecordOptionContractRequest carries everything stock-service needs
// to materialise one option-asset posting into a peer_option_contracts
// row at COMMIT_TX time.
//
// option_description_json is the verbatim assetId string from the
// SI-TX posting — a JSON-encoded OptionDescription with ticker,
// amount, strikePrice, currency, settlementDate, and negotiationId.
// Buyer/seller are the participant identifiers from the original
// OtcOffer; only the participant whose routingNumber matches this
// bank's own_routing is local — the other side is recorded as the
// foreign counterparty.
message RecordOptionContractRequest {
  string crossbank_tx_id = 1;          // peer_bank_code + ":" + locallyGeneratedKey
  int32 posting_index = 2;             // index into the original Transaction.postings
  string option_description_json = 3;
  PeerForeignBankId buyer_id = 4;
  PeerForeignBankId seller_id = 5;
  string direction = 6;                // "DEBIT" (seller side) or "CREDIT" (buyer side)
  // intent: "" or "accept" → form a new contract (lock seller holdings,
  // write peer_option_contracts row). "exercise" → transition the
  // existing contract referenced by the embedded OptionDescription's
  // negotiationId to status=exercised and run role-specific stock ops
  // (seller side: settle reservation + decrement holding; buyer side:
  // increment holding). Idempotent on (crossbank_tx_id, posting_index).
  string intent = 7;
}

message RecordOptionContractResponse {
  uint64 contract_id = 1;
}

// InitiateOptionExerciseRequest triggers a cross-bank option exercise.
// Called by the gateway when the buyer hits POST /api/v3/me/otc/contracts/peer/:id/exercise.
// Stock-service composes the 4-posting Transaction (strike money +
// option markers with intent=exercise) and dispatches via
// transaction-service.PeerTxService.InitiateOutboundTxWithPostings.
message InitiateOptionExerciseRequest {
  uint64 peer_option_contract_id = 1; // local row id (resolved by gateway)
  // Buyer's currency account that pays the strike on this bank.
  string buyer_account_number = 2;
}

message InitiateOptionExerciseResponse {
  string transaction_id = 1;
  string status = 2;
}

// CheckSellerCanDeliverRequest asks whether the seller participant
// has at least `quantity` unreserved shares of the given ticker.
// seller_id is the SI-TX participant identifier ("client-<n>" or
// "bank"); ticker is the stock ticker; quantity is the option's
// underlying share count.
message CheckSellerCanDeliverRequest {
  PeerForeignBankId seller_id = 1;
  string ticker = 2;
  int64 quantity = 3;
}

message CheckSellerCanDeliverResponse {
  bool ok = 1;
  int64 available_quantity = 2;
}

// ReserveSellerSharesRequest holds `quantity` shares of `ticker` for the
// seller participant against the cross-bank transaction identity
// crossbank_tx_id ("<peerCode>:<idem>"). Same fields as CheckSellerCanDeliver
// plus the identity to key the reservation on.
message ReserveSellerSharesRequest {
  PeerForeignBankId seller_id = 1;
  string ticker = 2;
  int64 quantity = 3;
  string crossbank_tx_id = 4;
}

message ReserveSellerSharesResponse {
  bool ok = 1;                  // false → insufficient/none; caller votes NO
  int64 reserved_quantity = 2;  // holding's total reserved after the hold
  int64 available_quantity = 3; // holding's available after the hold
}

// ValidatePeerOptionMoneyLegRequest carries one option-asset leg plus the
// total money the sender proposes to move for the same participant on this
// bank, so the receiver can reject any mismatch against its OWN stored terms.
message ValidatePeerOptionMoneyLegRequest {
  int64 negotiation_routing = 1;   // negotiationId.routingNumber from the option description
  string negotiation_id = 2;       // negotiationId.id
  string direction = 3;            // this leg's direction on this bank: DEBIT (seller) or CREDIT (buyer)
  string intent = 4;               // "exercise" or "accept"/""
  string ticker = 5;               // claimed ticker (cross-checked vs stored)
  int64 quantity = 6;              // claimed option quantity (cross-checked vs stored)
  string strike_price = 7;         // claimed per-unit strike (cross-checked vs stored)
  string money_amount = 8;         // total paired money for this participant on this bank (decimal string)
  string currency = 9;             // money leg currency
}

message ValidatePeerOptionMoneyLegResponse {
  bool ok = 1;        // false → receiver votes NO (UNACCEPTABLE_ASSET)
  string reason = 2;  // human-readable mismatch detail for logs
}

message ReleaseSellerSharesRequest {
  string crossbank_tx_id = 1;
}

message ReleaseSellerSharesResponse {
  int64 released_quantity = 1;
}

// ---- RecurringFundService -----------------------------------------------
// Monthly Dollar-Cost-Averaging template for fund contributions.

service RecurringFundService {
  rpc Create(CreateRecurringFundRequest) returns (RecurringFundResponse);
  rpc Get(GetRecurringFundRequest)        returns (RecurringFundResponse);
  rpc Pause(GetRecurringFundRequest)      returns (RecurringFundResponse);
  rpc Resume(GetRecurringFundRequest)     returns (RecurringFundResponse);
  rpc Cancel(GetRecurringFundRequest)     returns (CancelRecurringFundResponse);
  rpc ListMy(ListMyRecurringFundsRequest) returns (ListMyRecurringFundsResponse);
}

message CreateRecurringFundRequest {
  uint64 client_id          = 1;
  uint64 fund_id            = 2;
  string amount_rsd         = 3;
  uint64 source_account_id  = 4;
  int32  day_of_month       = 5; // 1..28
}

message GetRecurringFundRequest {
  uint64 id        = 1;
  uint64 client_id = 2;
}

message CancelRecurringFundResponse { bool cancelled = 1; }

message ListMyRecurringFundsRequest {
  uint64 client_id = 1;
}

message RecurringFundResponse {
  uint64 id                = 1;
  uint64 fund_id           = 2;
  string amount_rsd        = 3;
  uint64 source_account_id = 4;
  int32  day_of_month      = 5;
  bool   active            = 6;
  int64  last_run_unix     = 7;
  int64  next_run_unix     = 8;
  int64  created_at_unix   = 9;
}

message ListMyRecurringFundsResponse {
  repeated RecurringFundResponse items = 1;
}

// ---- RecurringOrderService ----------------------------------------------
// Templates the user defines once that auto-place Market orders on a
// weekly or monthly cadence. Insufficient funds skip the tick with a
// RECURRING_ORDER_SKIPPED push; successful placements emit
// RECURRING_ORDER_EXECUTED.

service RecurringOrderService {
  rpc CreateOrder(CreateRecurringOrderRequest) returns (RecurringOrderResponse);
  rpc GetOrder(GetRecurringOrderRequest)       returns (RecurringOrderResponse);
  rpc PauseOrder(GetRecurringOrderRequest)     returns (RecurringOrderResponse);
  rpc ResumeOrder(GetRecurringOrderRequest)    returns (RecurringOrderResponse);
  rpc CancelOrder(GetRecurringOrderRequest)    returns (RecurringOrderResponse);
  rpc ListMy(ListMyRecurringOrdersRequest)     returns (ListMyRecurringOrdersResponse);
}

message CreateRecurringOrderRequest {
  string owner_type = 1;
  uint64 owner_id   = 2;
  uint64 listing_id = 3;
  string side       = 4;   // buy | sell
  int64  quantity   = 5;
  uint64 account_id = 6;
  string interval   = 7;   // weekly | monthly
  int32  day_of_week  = 8; // 0..6 when interval=weekly
  int32  day_of_month = 9; // 1..28 when interval=monthly
  int64  start_date_unix = 10;
  int64  end_date_unix   = 11; // 0 = no end
}

message GetRecurringOrderRequest {
  uint64 id = 1;
  string owner_type = 2;
  uint64 owner_id   = 3;
}

message ListMyRecurringOrdersRequest {
  string owner_type = 1;
  uint64 owner_id   = 2;
}

message RecurringOrderResponse {
  uint64 id = 1;
  uint64 listing_id = 2;
  string side       = 3;
  int64  quantity   = 4;
  uint64 account_id = 5;
  string interval   = 6;
  int32  day_of_week  = 7;
  int32  day_of_month = 8;
  int64  start_date_unix = 9;
  int64  end_date_unix   = 10;
  string status     = 11;
  int64  last_run_unix = 12;
  int64  next_run_unix = 13;
  int64  created_at_unix = 14;
}

message ListMyRecurringOrdersResponse {
  repeated RecurringOrderResponse items = 1;
}

// ---- PriceAlertService --------------------------------------------------
// Per-owner reactive alerts on a listing's latest price or daily change %.
// Single-shot alerts auto-deactivate on first match; recurring alerts
// respect a cooldown between consecutive fires.

service PriceAlertService {
  rpc CreateAlert(CreatePriceAlertRequest) returns (PriceAlertResponse);
  rpc UpdateAlert(UpdatePriceAlertRequest) returns (PriceAlertResponse);
  rpc GetAlert(GetPriceAlertRequest)       returns (PriceAlertResponse);
  rpc DeleteAlert(DeletePriceAlertRequest) returns (DeletePriceAlertResponse);
  rpc ListMy(ListMyPriceAlertsRequest)     returns (ListMyPriceAlertsResponse);
}

message CreatePriceAlertRequest {
  string owner_type = 1;
  uint64 owner_id   = 2;
  uint64 listing_id = 3;
  string condition  = 4; // gte | lte | daily_change_pct_gte | daily_change_pct_lte
  string threshold  = 5; // decimal string
  bool   is_recurring   = 6;
  int32  cooldown_seconds = 7; // 60..86400 when is_recurring
  bool   email_too        = 8;
}

message UpdatePriceAlertRequest {
  uint64 id = 1;
  string owner_type = 2;
  uint64 owner_id   = 3;
  string condition  = 4;
  string threshold  = 5;
  bool   is_recurring     = 6;
  int32  cooldown_seconds = 7;
  bool   email_too        = 8;
  bool   active           = 9;
}

message GetPriceAlertRequest {
  uint64 id = 1;
  string owner_type = 2;
  uint64 owner_id   = 3;
}

message DeletePriceAlertRequest {
  uint64 id = 1;
  string owner_type = 2;
  uint64 owner_id   = 3;
}

message DeletePriceAlertResponse { bool deleted = 1; }

message ListMyPriceAlertsRequest {
  string owner_type = 1;
  uint64 owner_id   = 2;
}

message PriceAlertResponse {
  uint64 id = 1;
  uint64 listing_id = 2;
  string condition  = 3;
  string threshold  = 4;
  bool   is_recurring   = 5;
  int32  cooldown_seconds = 6;
  bool   email_too        = 7;
  bool   active           = 8;
  int64  last_triggered_unix = 9; // 0 = never
  int64  created_at_unix      = 10;
}

message ListMyPriceAlertsResponse {
  repeated PriceAlertResponse alerts = 1;
}

// ---- WatchlistService ---------------------------------------------------
// Personal list of tracked listings per (owner_type, owner_id).
// Read enriches each item with current price + daily change pulled from
// the existing listing tables. No notifications, no schedulers.

service WatchlistService {
  rpc AddItem(AddWatchlistItemRequest) returns (WatchlistItemResponse);
  rpc RemoveItem(RemoveWatchlistItemRequest) returns (RemoveWatchlistItemResponse);
  rpc ListMy(ListMyWatchlistRequest) returns (ListMyWatchlistResponse);
}

message AddWatchlistItemRequest {
  string owner_type = 1; // "client" | "bank"
  uint64 owner_id   = 2; // omitted/0 when owner_type=="bank"
  uint64 listing_id = 3;
}

message RemoveWatchlistItemRequest {
  string owner_type = 1;
  uint64 owner_id   = 2;
  uint64 listing_id = 3;
}

message RemoveWatchlistItemResponse {
  bool removed = 1;
}

message ListMyWatchlistRequest {
  string owner_type    = 1;
  uint64 owner_id      = 2;
  string listing_type  = 3; // optional: "stock" | "option" | "futures" | "forex"
}

message WatchlistItemResponse {
  uint64 id                   = 1;
  uint64 listing_id           = 2;
  string security_type        = 3;
  string ticker               = 4;
  string current_price        = 5;
  string daily_change         = 6;
  string daily_change_percent = 7;
  int64  added_at_unix        = 8;
}

message ListMyWatchlistResponse {
  repeated WatchlistItemResponse items = 1;
}

