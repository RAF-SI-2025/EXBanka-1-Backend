// ==================== Intra-bank OTC Options (Spec 2) ====================

service OTCOptionsService {
  rpc CreateOffer(CreateOTCOfferRequest)   returns (OTCOfferResponse);
  rpc ListMyOffers(ListMyOTCOffersRequest) returns (ListMyOTCOffersResponse);
  rpc GetOffer(GetOTCOfferRequest)         returns (OTCOfferDetailResponse);
  rpc CounterOffer(CounterOTCOfferRequest) returns (OTCOfferResponse);
  rpc AcceptOffer(AcceptOTCOfferRequest)   returns (AcceptOfferResponse);
  rpc RejectOffer(RejectOTCOfferRequest)   returns (OTCOfferResponse);

  rpc ListMyContracts(ListMyContractsRequest)   returns (ListContractsResponse);
  rpc GetContract(GetContractRequest)           returns (OptionContractResponse);
  rpc ExerciseContract(ExerciseContractRequest) returns (ExerciseResponse);

  // Negotiation history — terminal-only OTC offers (ACCEPTED, REJECTED,
  // EXPIRED, FAILED). Filters by status / date range / counterparty.
  rpc ListNegotiationHistory(ListNegotiationHistoryRequest) returns (ListMyOTCOffersResponse);

  // OTC trader ratings (Celina 3). One rating per (offer, rater).
  rpc SubmitRating(SubmitOTCRatingRequest)        returns (OTCRatingResponse);
  rpc GetTraderProfile(GetTraderProfileRequest)   returns (TraderProfileResponse);
  rpc ListReceivedRatings(ListReceivedRatingsRequest) returns (ListOTCRatingsResponse);

  // --- Phase 2 marketplace: parallel negotiation chains -----------
  // OTCOffer is the (immutable) listing; many bidders each open their
  // own OTCNegotiation chain. First-to-accept wins atomically; parent
  // listing flips to "consumed" and sibling chains cascade-cancel.
  // See docs/superpowers/plans/2026-05-16-otc-options-marketplace.md.
  rpc OpenNegotiation(OpenNegotiationRequest)         returns (OTCNegotiationResponse);
  rpc CounterNegotiation(CounterNegotiationRequest)   returns (OTCNegotiationResponse);
  rpc AcceptNegotiationChain(OTCAcceptNegotiationRequest) returns (OTCAcceptNegotiationResponse);
  rpc RejectNegotiation(RejectNegotiationRequest)     returns (OTCNegotiationResponse);
  rpc CancelNegotiation(CancelNegotiationRequest)     returns (OTCNegotiationResponse);
  rpc CancelListing(CancelListingRequest)             returns (CancelListingResponse);
  rpc ListMyNegotiations(ListMyNegotiationsRequest)   returns (ListNegotiationsResponse);
  rpc ListNegotiationsByListing(ListNegotiationsByListingRequest) returns (ListNegotiationsResponse);
  rpc ListNegotiationRevisions(ListNegotiationRevisionsRequest) returns (ListNegotiationRevisionsResponse);
  // GetOfferTimeline returns the offer plus every chain's revisions merged
  // and sorted by created_at — the poster's cross-chain audit view. Same
  // audience authorization as ListNegotiationsByListing.
  rpc GetOfferTimeline(GetOfferTimelineRequest) returns (GetOfferTimelineResponse);
}

// OTCNegotiationResponse is the wire-form projection of an
// OTCNegotiation row (one bidder's chain against a parent OTCOffer).
message OTCNegotiationResponse {
  uint64 id                          = 1;
  uint64 parent_offer_id             = 2;
  string bidder_owner_type           = 3;  // "client" | "bank"
  uint64 bidder_owner_id             = 4;  // 0 when owner_type=="bank"
  uint64 bidder_account_id           = 5;
  string quantity                    = 6;  // decimal as string
  string strike_price                = 7;
  string premium                     = 8;
  string settlement_date             = 9;  // ISO-8601
  string status                      = 10; // open|countered|accepted|rejected|cancelled|expired
  string last_action_by_owner_type   = 11;
  uint64 last_action_by_owner_id     = 12;
  string last_action_at              = 13; // ISO-8601
  string created_at                  = 14;
  string updated_at                  = 15;
  int64  version                     = 16;
  // minted_contract_id is 0 when no contract was minted (non-accepted
  // terminal status, or accepted but formation saga failed). Non-zero
  // only on status="accepted" rows where the contract formed successfully.
  uint64 minted_contract_id          = 17;
}

// OTCNegotiationRevisionResponse is one entry in the revision chain.
// Populated by ListNegotiationRevisions.
message OTCNegotiationRevisionResponse {
  uint64 id              = 1;
  uint64 negotiation_id  = 2;
  int32  revision_number = 3;
  string action          = 4;  // BID|COUNTER|ACCEPT|REJECT
  string quantity        = 5;
  string strike_price    = 6;
  string premium         = 7;
  string settlement_date = 8;
  string action_by_principal_type = 9;
  uint64 action_by_principal_id   = 10;
  string created_at               = 11;
}

message ListNegotiationRevisionsRequest {
  uint64 negotiation_id    = 1;
  string caller_owner_type = 2;
  uint64 caller_owner_id   = 3;
}

message ListNegotiationRevisionsResponse {
  repeated OTCNegotiationRevisionResponse revisions = 1;
}

message OpenNegotiationRequest {
  uint64 parent_offer_id     = 1;
  string bidder_owner_type   = 2;
  uint64 bidder_owner_id     = 3;
  uint64 bidder_account_id   = 4;
  string quantity            = 5;
  string strike_price        = 6;
  string premium             = 7;
  string settlement_date     = 8;
  string acting_principal_type = 9;
  uint64 acting_principal_id   = 10;
  uint64 acting_employee_id    = 11;
}

message CounterNegotiationRequest {
  uint64 negotiation_id        = 1;
  string caller_owner_type     = 2;
  uint64 caller_owner_id       = 3;
  string quantity              = 4;
  string strike_price          = 5;
  string premium               = 6;
  string settlement_date       = 7;
  string acting_principal_type = 8;
  uint64 acting_principal_id   = 9;
  uint64 acting_employee_id    = 10;
}

message OTCAcceptNegotiationRequest {
  uint64 negotiation_id        = 1;
  string caller_owner_type     = 2;
  uint64 caller_owner_id       = 3;
  string acting_principal_type = 4;
  uint64 acting_principal_id   = 5;
  uint64 acting_employee_id    = 6;
  // Phase 9: the accepter's own account. Pays the premium when the
  // accepter is the buyer (parent.direction = sell_initiated); receives
  // the premium when accepter is the seller (parent.direction =
  // buy_initiated). Required — accept now mints a contract and moves
  // money, both of which need a bound account on the accepter's side.
  uint64 acceptor_account_id   = 7;
  // E2: when non-zero the buyer side of this accept is on behalf of a fund.
  // Premium debit comes from the fund's RSD account; the resulting contract
  // is fund-owned. Caller must be the fund's manager (acting_employee_id
  // must equal fund.manager_employee_id). acceptor_account_id MUST equal
  // fund.rsd_account_id.
  uint64 on_behalf_of_fund_id  = 8;
}

// OTCAcceptNegotiationResponse — Phase 9 includes the minted contract.
// `cancelled_siblings` lists every other chain on the parent that the
// state TX flipped to "cancelled". `contract` is the OptionContract
// produced by the premium-payment saga that ran after the state TX
// (null only when the saga failed and the negotiation was marked
// "failed").
message OTCAcceptNegotiationResponse {
  OTCNegotiationResponse winning            = 1;
  uint64                  parent_offer_id   = 2;
  string                  parent_status     = 3;
  repeated OTCNegotiationResponse cancelled_siblings = 4;
  OTCMintedContract       contract          = 5;
}

// OTCMintedContract is a thin projection of model.OptionContract for
// the AcceptNegotiation response. Same fields the existing
// /me/otc/contracts route returns, minus the cross-bank-only ones.
message OTCMintedContract {
  uint64 id              = 1;
  uint64 offer_id        = 2;
  string buyer_owner_type = 3;
  uint64 buyer_owner_id  = 4;
  string seller_owner_type = 5;
  uint64 seller_owner_id = 6;
  string ticker          = 7;
  string quantity        = 8;
  string strike_price    = 9;
  string premium_paid    = 10;
  string premium_currency = 11;
  string strike_currency = 12;
  string settlement_date = 13;
  uint64 buyer_account_id = 14;
  uint64 seller_account_id = 15;
  string status          = 16;
  string premium_paid_at = 17;
}

message RejectNegotiationRequest {
  uint64 negotiation_id        = 1;
  string caller_owner_type     = 2;
  uint64 caller_owner_id       = 3;
  string acting_principal_type = 4;
  uint64 acting_principal_id   = 5;
  uint64 acting_employee_id    = 6;
}

message CancelNegotiationRequest {
  uint64 negotiation_id        = 1;
  string caller_owner_type     = 2;
  uint64 caller_owner_id       = 3;
  string acting_principal_type = 4;
  uint64 acting_principal_id   = 5;
  uint64 acting_employee_id    = 6;
}

// CancelListingRequest closes a parent OTCOffer listing the caller posted.
// Cascade-cancels all open child chains in the same transaction.
message CancelListingRequest {
  uint64 offer_id              = 1;
  string caller_owner_type     = 2;
  uint64 caller_owner_id       = 3;
  string acting_principal_type = 4;
  uint64 acting_principal_id   = 5;
  uint64 acting_employee_id    = 6;
}

// CancelListingResponse reports the cancelled parent and every chain
// that cascade-cancelled. Empty chains slice ⇒ no bids were active.
message CancelListingResponse {
  uint64 offer_id                                  = 1;
  string status                                    = 2; // always "cancelled"
  repeated OTCNegotiationResponse cancelled_chains = 3;
}

message ListMyNegotiationsRequest {
  string owner_type        = 1;
  uint64 owner_id          = 2;
  repeated string statuses = 3;
  int32  page              = 4;
  int32  page_size         = 5;
}

message ListNegotiationsByListingRequest {
  uint64 parent_offer_id   = 1;
  // Caller identity for audience authorization. The poster of the parent
  // listing may see every chain; an employee (owner_type="bank") reaches
  // this RPC only after the gateway's otc.read.all permission gate. Any
  // other client (e.g. a competing bidder) receives PermissionDenied.
  string caller_owner_type = 2;  // "client" | "bank"
  uint64 caller_owner_id   = 3;  // 0 when owner_type=="bank"
}

message GetOfferTimelineRequest {
  uint64 parent_offer_id   = 1;
  string caller_owner_type = 2;  // "client" | "bank"
  uint64 caller_owner_id   = 3;  // 0 when owner_type=="bank"
}

// OTCTimelineEntry is one revision across any chain on a listing, enriched
// with its chain's bidder identity. The full timeline is every chain's
// revisions merged and sorted by created_at — the offer poster's
// cross-chain audit view.
message OTCTimelineEntry {
  uint64 negotiation_id           = 1;
  string bidder_owner_type        = 2;  // "client" | "bank"
  uint64 bidder_owner_id          = 3;  // 0 when owner_type=="bank"
  int32  revision_number          = 4;
  string action                   = 5;  // BID|COUNTER|ACCEPT|REJECT
  string quantity                 = 6;
  string strike_price             = 7;
  string premium                  = 8;
  string settlement_date          = 9;  // ISO-8601
  string action_by_principal_type = 10; // "client" | "employee"
  uint64 action_by_principal_id   = 11;
  string created_at               = 12; // ISO-8601
}

message GetOfferTimelineResponse {
  OTCOfferResponse          offer    = 1;
  repeated OTCTimelineEntry timeline = 2;
}

message ListNegotiationsResponse {
  repeated OTCNegotiationResponse negotiations = 1;
  int64                            total       = 2;
}

// --------------------------------------------------------------------
// OTCStockMarketGRPCService — Phase 3 stocks marketplace (sell + buy
// directions). Wires the new OTCStockService. Fill RPCs are deferred
// to Phase 3B; for now the deprecated OTCGRPCService.BuyOffer backs
// sell-side fills under the legacy route.
// See docs/superpowers/plans/2026-05-16-otc-stocks-marketplace.md.
// --------------------------------------------------------------------
service OTCStockMarketGRPCService {
  rpc CreateOTCStockOffer(CreateOTCStockOfferRequest) returns (OTCStockOfferResponse);
  rpc CancelOTCStockOffer(CancelOTCStockOfferRequest) returns (CancelOTCStockOfferResponse);
  rpc ListMyOTCStocks(ListMyOTCStocksRequest)         returns (ListMyOTCStocksResponse);

  // SellOTCStockOffer fills a buy-direction offer: seller decrements
  // their holding, buyer's reserved cash is settled via account-service
  // PartialSettleReservation, seller's account is credited, buyer's
  // holding is upserted. Multi-step saga with compensation on each
  // intermediate failure.
  rpc SellOTCStockOffer(SellOTCStockOfferRequest) returns (OTCStockFillResult);
}

message SellOTCStockOfferRequest {
  uint64 offer_id              = 1; // otc_stock_buy_offers.id
  string seller_owner_type     = 2;
  uint64 seller_owner_id       = 3;
  int64  quantity              = 4;
  uint64 seller_account_id     = 5; // where proceeds are credited
  uint64 acting_employee_id    = 6;
}

message OTCStockFillResult {
  uint64 offer_id        = 1;
  int64  filled_quantity = 2;
  string price_per_unit  = 3;
  string total_amount    = 4;
  string seller_credited_account_number = 5;
}

message OTCStockOfferResponse {
  string direction      = 1;   // "sell" | "buy"
