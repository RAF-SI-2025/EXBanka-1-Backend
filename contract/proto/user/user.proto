syntax = "proto3";

package user;

option go_package = "github.com/exbanka/contract/userpb;userpb";

service UserService {
  rpc CreateEmployee(CreateEmployeeRequest) returns (EmployeeResponse);
  rpc GetEmployee(GetEmployeeRequest) returns (EmployeeResponse);
  rpc ListEmployees(ListEmployeesRequest) returns (ListEmployeesResponse);
  rpc UpdateEmployee(UpdateEmployeeRequest) returns (EmployeeResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc GetRole(GetRoleRequest) returns (RoleResponse);
  rpc CreateRole(CreateRoleRequest) returns (RoleResponse);
  rpc UpdateRolePermissions(UpdateRolePermissionsRequest) returns (RoleResponse);
  rpc AssignPermissionToRole(AssignPermissionToRoleRequest) returns (AssignPermissionToRoleResponse);
  rpc RevokePermissionFromRole(RevokePermissionFromRoleRequest) returns (RevokePermissionFromRoleResponse);
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc SetEmployeeRoles(SetEmployeeRolesRequest) returns (EmployeeResponse);
  rpc SetEmployeeAdditionalPermissions(SetEmployeePermissionsRequest) returns (EmployeeResponse);
  rpc ListEmployeeFullNames(ListEmployeeFullNamesRequest) returns (ListEmployeeFullNamesResponse);
}

message ListEmployeeFullNamesRequest {
  repeated int64 employee_ids = 1;
}
message ListEmployeeFullNamesResponse {
  map<int64, string> names_by_id = 1;
}

message CreateEmployeeRequest {
  string first_name = 1;
  string last_name = 2;
  int64 date_of_birth = 3;
  string gender = 4;
  string email = 5;
  string phone = 6;
  string address = 7;
  string username = 8;
  string position = 9;
  string department = 10;
  string role = 11;
  string jmbg = 13;
}

message UpdateEmployeeRequest {
  int64 id = 1;
  optional string last_name = 2;
  optional string gender = 3;
  optional string phone = 4;
  optional string address = 5;
  optional string position = 6;
  optional string department = 7;
  optional string role = 8;
  optional string jmbg = 10;
}

message GetEmployeeRequest {
  int64 id = 1;
}

message ListEmployeesRequest {
  string email_filter = 1;
  string name_filter = 2;
  string position_filter = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message EmployeeResponse {
  int64 id = 1;
  string first_name = 2;
  string last_name = 3;
  int64 date_of_birth = 4;
  string gender = 5;
  string email = 6;
  string phone = 7;
  string address = 8;
  string username = 9;
  string position = 10;
  string department = 11;
  string role = 13;
  repeated string permissions = 14;
  string jmbg = 15;
  repeated string roles = 16;
  repeated string additional_permissions = 17;
}

message ListEmployeesResponse {
  repeated EmployeeResponse employees = 1;
  int32 total_count = 2;
}

message RoleResponse {
  int64 id = 1;
  string name = 2;
  string description = 3;
  repeated string permissions = 4;
}

message ListRolesRequest {}
message ListRolesResponse { repeated RoleResponse roles = 1; }
message GetRoleRequest { int64 id = 1; }

message CreateRoleRequest {
  string name = 1;
  string description = 2;
  repeated string permission_codes = 3;
}

message UpdateRolePermissionsRequest {
  int64 role_id = 1;
  repeated string permission_codes = 2;
}

message AssignPermissionToRoleRequest {
  uint64 role_id = 1;
  string permission = 2;
}
message AssignPermissionToRoleResponse {}

message RevokePermissionFromRoleRequest {
  uint64 role_id = 1;
  string permission = 2;
}
message RevokePermissionFromRoleResponse {}

message PermissionResponse {
  int64 id = 1;
  string code = 2;
  string description = 3;
  string category = 4;
}

message ListPermissionsRequest {}
message ListPermissionsResponse { repeated PermissionResponse permissions = 1; }

message SetEmployeeRolesRequest {
  int64 employee_id = 1;
  repeated string role_names = 2;
}

message SetEmployeePermissionsRequest {
  int64 employee_id = 1;
  repeated string permission_codes = 2;
}

service EmployeeLimitService {
  rpc GetEmployeeLimits(EmployeeLimitRequest) returns (EmployeeLimitResponse);
  rpc SetEmployeeLimits(SetEmployeeLimitsRequest) returns (EmployeeLimitResponse);
  rpc ApplyLimitTemplate(ApplyLimitTemplateRequest) returns (EmployeeLimitResponse);
  rpc ListLimitTemplates(ListLimitTemplatesRequest) returns (ListLimitTemplatesResponse);
  rpc CreateLimitTemplate(CreateLimitTemplateRequest) returns (LimitTemplateResponse);
}

message EmployeeLimitRequest { int64 employee_id = 1; }

message EmployeeLimitResponse {
  int64 id = 1;
  int64 employee_id = 2;
  string max_loan_approval_amount = 3;
  string max_single_transaction = 4;
  string max_daily_transaction = 5;
  string max_client_daily_limit = 6;
  string max_client_monthly_limit = 7;
}

message SetEmployeeLimitsRequest {
  int64 employee_id = 1;
  string max_loan_approval_amount = 2;
  string max_single_transaction = 3;
  string max_daily_transaction = 4;
  string max_client_daily_limit = 5;
  string max_client_monthly_limit = 6;
}

message ApplyLimitTemplateRequest {
  int64 employee_id = 1;
  string template_name = 2;
}

message ListLimitTemplatesRequest {}

message ListLimitTemplatesResponse {
  repeated LimitTemplateResponse templates = 1;
}

message CreateLimitTemplateRequest {
  string name = 1;
  string description = 2;
  string max_loan_approval_amount = 3;
  string max_single_transaction = 4;
  string max_daily_transaction = 5;
  string max_client_daily_limit = 6;
  string max_client_monthly_limit = 7;
}

message LimitTemplateResponse {
  int64 id = 1;
  string name = 2;
  string description = 3;
  string max_loan_approval_amount = 4;
  string max_single_transaction = 5;
  string max_daily_transaction = 6;
  string max_client_daily_limit = 7;
  string max_client_monthly_limit = 8;
}

// ==================== Actuary ====================

service ActuaryService {
  rpc ListActuaries(ListActuariesRequest) returns (ListActuariesResponse);
  rpc GetActuaryInfo(GetActuaryInfoRequest) returns (ActuaryInfo);
  rpc SetActuaryLimit(SetActuaryLimitRequest) returns (ActuaryInfo);
  rpc ResetActuaryUsedLimit(ResetActuaryUsedLimitRequest) returns (ActuaryInfo);
  rpc SetNeedApproval(SetNeedApprovalRequest) returns (ActuaryInfo);
  rpc UpdateUsedLimit(UpdateUsedLimitRequest) returns (ActuaryInfo);
}

message ActuaryInfo {
  uint64 id = 1;
  uint64 employee_id = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  string role = 6;
  string limit = 7;
  string used_limit = 8;
  bool need_approval = 9;
}

message ListActuariesRequest {
  string search = 1;
  string position = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListActuariesResponse {
  repeated ActuaryInfo actuaries = 1;
  int64 total_count = 2;
}

message GetActuaryInfoRequest {
  uint64 employee_id = 1;
}

message SetActuaryLimitRequest {
  uint64 id = 1;
  string limit = 2;
}

message ResetActuaryUsedLimitRequest {
  uint64 id = 1;
}

message SetNeedApprovalRequest {
  uint64 id = 1;
  bool need_approval = 2;
}

message UpdateUsedLimitRequest {
  uint64 id = 1;
  string amount = 2;
  string currency = 3;
}

// ==================== Blueprints ====================

service BlueprintService {
  rpc CreateBlueprint(CreateBlueprintRequest) returns (BlueprintResponse);
  rpc GetBlueprint(GetBlueprintRequest) returns (BlueprintResponse);
  rpc ListBlueprints(ListBlueprintsRequest) returns (ListBlueprintsResponse);
  rpc UpdateBlueprint(UpdateBlueprintRequest) returns (BlueprintResponse);
  rpc DeleteBlueprint(DeleteBlueprintRequest) returns (DeleteBlueprintResponse);
  rpc ApplyBlueprint(ApplyBlueprintRequest) returns (ApplyBlueprintResponse);
}

message CreateBlueprintRequest {
  string name = 1;
  string description = 2;
  string type = 3;           // "employee", "actuary", "client"
  string values_json = 4;    // JSON string of type-specific values
}

message GetBlueprintRequest {
  uint64 id = 1;
}

message ListBlueprintsRequest {
  string type = 1;           // optional filter; empty = all
}

message UpdateBlueprintRequest {
  uint64 id = 1;
  string name = 2;
  string description = 3;
  string values_json = 4;    // JSON string; empty = keep existing
}

message DeleteBlueprintRequest {
  uint64 id = 1;
}

message DeleteBlueprintResponse {}

message ApplyBlueprintRequest {
  uint64 blueprint_id = 1;
  int64 target_id = 2;       // employee_id or client_id depending on type
}

message ApplyBlueprintResponse {}

message BlueprintResponse {
  uint64 id = 1;
  string name = 2;
  string description = 3;
  string type = 4;
  string values_json = 5;    // JSON string
  string created_at = 6;     // RFC3339
  string updated_at = 7;     // RFC3339
}

message ListBlueprintsResponse {
  repeated BlueprintResponse blueprints = 1;
}
