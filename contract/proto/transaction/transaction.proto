syntax = "proto3";
package transaction;
option go_package = "github.com/exbanka/contract/transactionpb;transactionpb";

service TransactionService {
  rpc CreatePayment(CreatePaymentRequest) returns (PaymentResponse);
  rpc ExecutePayment(ExecutePaymentRequest) returns (PaymentResponse);
  rpc GetPayment(GetPaymentRequest) returns (PaymentResponse);
  rpc ListPaymentsByAccount(ListPaymentsByAccountRequest) returns (ListPaymentsResponse);
  rpc ListPaymentsByClient(ListPaymentsByClientRequest) returns (ListPaymentsResponse);

  rpc CreateTransfer(CreateTransferRequest) returns (TransferResponse);
  rpc ExecuteTransfer(ExecuteTransferRequest) returns (TransferResponse);
  rpc GetTransfer(GetTransferRequest) returns (TransferResponse);
  rpc ListTransfersByClient(ListTransfersByClientRequest) returns (ListTransfersResponse);

  rpc CreatePaymentRecipient(CreatePaymentRecipientRequest) returns (PaymentRecipientResponse);
  rpc GetPaymentRecipient(GetPaymentRecipientRequest) returns (PaymentRecipientResponse);
  rpc ListPaymentRecipients(ListPaymentRecipientsRequest) returns (ListPaymentRecipientsResponse);
  rpc UpdatePaymentRecipient(UpdatePaymentRecipientRequest) returns (PaymentRecipientResponse);
  rpc DeletePaymentRecipient(DeletePaymentRecipientRequest) returns (DeletePaymentRecipientResponse);

}

message CreatePaymentRequest {
  string from_account_number = 1;
  string to_account_number = 2;
  string amount = 3;
  string recipient_name = 4;
  string payment_code = 5;
  string reference_number = 6;
  string payment_purpose = 7;
  uint64 client_id = 8;
  string client_email = 9;
}

message GetPaymentRequest { uint64 id = 1; }

message ListPaymentsByAccountRequest {
  string account_number = 1;
  string date_from = 2;
  string date_to = 3;
  string status_filter = 4;
  string amount_min = 5;
  string amount_max = 6;
  int32 page = 7;
  int32 page_size = 8;
}

message ListPaymentsResponse {
  repeated PaymentResponse payments = 1;
  int64 total = 2;
}

message ListPaymentsByClientRequest {
  uint64 client_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  repeated string account_numbers = 4;
}

message PaymentResponse {
  uint64 id = 1;
  string from_account_number = 2;
  string to_account_number = 3;
  string initial_amount = 4;
  string final_amount = 5;
  string commission = 6;
  string recipient_name = 7;
  string payment_code = 8;
  string reference_number = 9;
  string payment_purpose = 10;
  string status = 11;
  string timestamp = 12;
  int64 verification_code_expires_at = 13;
  uint64 client_id = 14; // owner of the payment, used for /api/me ownership checks
}

message CreateTransferRequest {
  string from_account_number = 1;
  string to_account_number = 2;
  string amount = 3;
  string from_currency = 4;
  string to_currency = 5;
  uint64 client_id = 6;
  string client_email = 7;
}

message GetTransferRequest { uint64 id = 1; }

message ListTransfersByClientRequest {
  uint64 client_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  repeated string account_numbers = 4;
}

message ListTransfersResponse {
  repeated TransferResponse transfers = 1;
  int64 total = 2;
}

message TransferResponse {
  uint64 id = 1;
  string from_account_number = 2;
  string to_account_number = 3;
  string initial_amount = 4;
  string final_amount = 5;
  string exchange_rate = 6;
  string commission = 7;
  string timestamp = 8;
  string status = 9;
  int64 verification_code_expires_at = 10;
  uint64 client_id = 11; // owner of the transfer, used for /api/me ownership checks
}

message CreatePaymentRecipientRequest {
  uint64 client_id = 1;
  string recipient_name = 2;
  string account_number = 3;
}

message GetPaymentRecipientRequest { uint64 id = 1; }

message ListPaymentRecipientsRequest { uint64 client_id = 1; }

message ListPaymentRecipientsResponse {
  repeated PaymentRecipientResponse recipients = 1;
}

message UpdatePaymentRecipientRequest {
  uint64 id = 1;
  optional string recipient_name = 2;
  optional string account_number = 3;
}

message DeletePaymentRecipientRequest { uint64 id = 1; }
message DeletePaymentRecipientResponse { bool success = 1; }

message PaymentRecipientResponse {
  uint64 id = 1;
  uint64 client_id = 2;
  string recipient_name = 3;
  string account_number = 4;
  string created_at = 5;
}

message ExecutePaymentRequest {
  uint64 payment_id = 1;
  uint64 client_id = 2;
  string verification_code = 3;   // deprecated: kept for backwards compat
  uint64 challenge_id = 4;        // verification-service challenge ID
}

message ExecuteTransferRequest {
  uint64 transfer_id = 1;
  uint64 client_id = 2;
  string verification_code = 3;   // deprecated: kept for backwards compat
  uint64 challenge_id = 4;        // verification-service challenge ID
}

service FeeService {
  rpc ListFees(ListFeesRequest) returns (ListFeesResponse);
  rpc CreateFee(CreateFeeRequest) returns (TransferFeeResponse);
  rpc UpdateFee(UpdateFeeRequest) returns (TransferFeeResponse);
  rpc DeleteFee(DeleteFeeRequest) returns (DeleteFeeResponse);
  rpc CalculateFee(CalculateFeeRequest) returns (CalculateFeeResponse);
}

message ListFeesRequest {}

message ListFeesResponse {
  repeated TransferFeeResponse fees = 1;
}

message CreateFeeRequest {
  string name = 1;
  string fee_type = 2;
  string fee_value = 3;
  string min_amount = 4;
  string max_fee = 5;
  string transaction_type = 6;
  string currency_code = 7;
}

message UpdateFeeRequest {
  uint64 id = 1;
  string name = 2;
  string fee_type = 3;
  string fee_value = 4;
  string min_amount = 5;
  string max_fee = 6;
  string transaction_type = 7;
  string currency_code = 8;
  bool active = 9;
}

message DeleteFeeRequest { uint64 id = 1; }

message DeleteFeeResponse {
  bool success = 1;
  string message = 2;
}

message CalculateFeeRequest {
  string amount = 1;
  string transaction_type = 2;   // "payment" or "transfer"
  string currency_code = 3;      // e.g. "RSD", "EUR"
}

message CalculateFeeResponse {
  string total_fee = 1;
  repeated FeeBreakdown applied_fees = 2;
}

message FeeBreakdown {
  string name = 1;
  string fee_type = 2;
  string fee_value = 3;
  string calculated_amount = 4;
}

message TransferFeeResponse {
  uint64 id = 1;
  string name = 2;
  string fee_type = 3;
  string fee_value = 4;
  string min_amount = 5;
  string max_fee = 6;
  string transaction_type = 7;
  string currency_code = 8;
  bool active = 9;
}

// PeerTxService backs the SI-TX `POST /api/v3/interbank` endpoint. Each
// RPC corresponds to one messageType in the SI-TX envelope. Phase 2
// stubs the TX RPCs as Unimplemented; Phase 3 fills them in.
service PeerTxService {
  rpc HandleNewTx(SiTxNewTxRequest) returns (SiTxVoteResponse);
  rpc HandleCommitTx(SiTxCommitRequest) returns (SiTxAckResponse);
  rpc HandleRollbackTx(SiTxRollbackRequest) returns (SiTxAckResponse);
  rpc InitiateOutboundTx(SiTxInitiateRequest) returns (SiTxInitiateResponse);
  rpc InitiateOutboundTxWithPostings(SiTxInitiateWithPostingsRequest) returns (SiTxInitiateResponse);
}

message SiTxIdempotenceKey {
  int64 routing_number = 1;
  string locally_generated_key = 2;
}

message SiTxPosting {
  int64 routing_number = 1;
  string account_id = 2;
  string asset_id = 3;
  string amount = 4; // decimal as string
  string direction = 5; // DEBIT | CREDIT
}

message SiTxNewTxRequest {
  SiTxIdempotenceKey idempotence_key = 1;
  string peer_bank_code = 2;
  repeated SiTxPosting postings = 3;
}

message SiTxNoVote {
  string reason = 1;
  int32 posting_index = 2; // -1 when not posting-scoped
  bool posting_index_set = 3;
}

message SiTxVoteResponse {
  string type = 1; // YES | NO
  repeated SiTxNoVote no_votes = 2;
  string transaction_id = 3; // opaque receiver-side id, set on YES
}

message SiTxCommitRequest {
  SiTxIdempotenceKey idempotence_key = 1;
  string peer_bank_code = 2;
  string transaction_id = 3;
}

message SiTxRollbackRequest {
  SiTxIdempotenceKey idempotence_key = 1;
  string peer_bank_code = 2;
  string transaction_id = 3;
}

message SiTxAckResponse {
  // Empty by design (HTTP 204 response).
}

message SiTxInitiateRequest {
  string from_account_number = 1;
  string to_account_number = 2;
  string amount = 3;
  string currency = 4;
}

message SiTxInitiateResponse {
  string transaction_id = 1;
  string poll_url = 2;
  string status = 3;
}

message SiTxInitiateWithPostingsRequest {
  string peer_bank_code = 1;
  repeated SiTxPosting postings = 2;
  string tx_kind = 3; // "transfer" | "otc-accept" | "otc-exercise"
}

// PeerBankAdminService is the runtime-editable peer-bank registry. Lets
// admins add/update/remove peer banks without redeploys. Gated by the
// peer_banks.manage.any permission.
service PeerBankAdminService {
  rpc ListPeerBanks(ListPeerBanksRequest) returns (ListPeerBanksResponse);
  rpc GetPeerBank(GetPeerBankRequest) returns (PeerBank);
  rpc CreatePeerBank(CreatePeerBankRequest) returns (PeerBank);
  rpc UpdatePeerBank(UpdatePeerBankRequest) returns (PeerBank);
  rpc DeletePeerBank(DeletePeerBankRequest) returns (DeletePeerBankResponse);
  // Phase 3 internal RPCs (Celina 5 SI-TX): return full peer-bank record
  // including HMAC keys + plaintext API token. NOT exposed via REST —
  // gateway-internal use only.
  rpc ResolvePeerByAPIToken(ResolvePeerByAPITokenRequest) returns (ResolvePeerByAPITokenResponse);
  rpc ResolvePeerByBankCode(ResolvePeerByBankCodeRequest) returns (ResolvePeerByBankCodeResponse);
}

message PeerBank {
  uint64 id = 1;
  string bank_code = 2;
  int64 routing_number = 3;
  string base_url = 4;
  string api_token_preview = 5;
  bool hmac_enabled = 6;
  bool active = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message ListPeerBanksRequest {
  bool active_only = 1;
}

message ListPeerBanksResponse {
  repeated PeerBank peer_banks = 1;
}

message GetPeerBankRequest {
  uint64 id = 1;
}

message CreatePeerBankRequest {
  string bank_code = 1;
  int64 routing_number = 2;
  string base_url = 3;
  string api_token = 4;
  string hmac_inbound_key = 5;
  string hmac_outbound_key = 6;
  bool active = 7;
}

message UpdatePeerBankRequest {
  uint64 id = 1;
  string base_url = 2;
  bool base_url_set = 3;
  string api_token = 4;
  bool api_token_set = 5;
  string hmac_inbound_key = 6;
  bool hmac_inbound_key_set = 7;
  string hmac_outbound_key = 8;
  bool hmac_outbound_key_set = 9;
  bool active = 10;
  bool active_set = 11;
}

message DeletePeerBankRequest {
  uint64 id = 1;
}

message DeletePeerBankResponse {
  // Empty.
}

message PeerBankFull {
  uint64 id = 1;
  string bank_code = 2;
  int64 routing_number = 3;
  string base_url = 4;
  string api_token_plaintext = 5; // server-side use only
  string hmac_inbound_key = 6;
  string hmac_outbound_key = 7;
  bool active = 8;
}

message ResolvePeerByAPITokenRequest {
  string api_token = 1;
}

message ResolvePeerByAPITokenResponse {
  PeerBankFull peer_bank = 1;
  bool found = 2;
}

message ResolvePeerByBankCodeRequest {
  string bank_code = 1;
}

message ResolvePeerByBankCodeResponse {
  PeerBankFull peer_bank = 1;
  bool found = 2;
}
