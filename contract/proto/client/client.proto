syntax = "proto3";
package client;
option go_package = "github.com/exbanka/contract/clientpb;clientpb";

service ClientService {
  rpc CreateClient(CreateClientRequest) returns (ClientResponse);
  rpc GetClient(GetClientRequest) returns (ClientResponse);
  rpc GetClientByEmail(GetClientByEmailRequest) returns (ClientResponse);
  rpc ListClients(ListClientsRequest) returns (ListClientsResponse);
  rpc UpdateClient(UpdateClientRequest) returns (ClientResponse);

  // Audit-trail reads. Returns changelog rows scoped by entity_type +
  // entity_id; pagination matches list endpoints (1-based page).
  rpc ListChangelog(ListChangelogRequest) returns (ListChangelogResponse);

  // ListAllChangelogs returns every changelog row for this service (global
  // audit view, admin-only). Supports optional filters: since/until (unix
  // seconds), actor_id (changed_by), action string, and pagination.
  rpc ListAllChangelogs(ListAllChangelogsRequest) returns (ListAllChangelogsResponse);
}

message ListChangelogRequest {
  string entity_type = 1; // e.g. "client" or "client_limit"
  int64  entity_id   = 2;
  int32  page        = 3;
  int32  page_size   = 4;
}

message ChangelogEntry {
  uint64 id          = 1;
  string entity_type = 2;
  int64  entity_id   = 3;
  string action      = 4;
  string field_name  = 5;
  string old_value   = 6;
  string new_value   = 7;
  int64  changed_by  = 8;
  int64  changed_at  = 9;
  string reason      = 10;
}

message ListChangelogResponse {
  repeated ChangelogEntry entries = 1;
  int64                   total   = 2;
}

message ListAllChangelogsRequest {
  int32  page      = 1;
  int32  page_size = 2;
  int64  since     = 3; // unix seconds, 0 = no lower bound
  int64  until     = 4; // unix seconds, 0 = no upper bound
  int64  actor_id  = 5; // changed_by filter, 0 = all
  string action    = 6; // exact match, "" = all
}

message ListAllChangelogsResponse {
  repeated ChangelogEntry entries = 1;
  int64                   total   = 2;
  int32                   page    = 3;
  int32                   page_size = 4;
}

message CreateClientRequest {
  string first_name = 1;
  string last_name = 2;
  int64 date_of_birth = 3;
  string gender = 4;
  string email = 5;
  string phone = 6;
  string address = 7;
  string jmbg = 8;
}

message GetClientRequest {
  uint64 id = 1;
}

message GetClientByEmailRequest {
  string email = 1;
}

message ListClientsRequest {
  string email_filter = 1;
  string name_filter = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListClientsResponse {
  repeated ClientResponse clients = 1;
  int64 total = 2;
}

message UpdateClientRequest {
  uint64 id = 1;
  optional string first_name = 2;
  optional string last_name = 3;
  optional int64 date_of_birth = 4;
  optional string gender = 5;
  optional string email = 6;
  optional string phone = 7;
  optional string address = 8;
}

message ClientResponse {
  uint64 id = 1;
  string first_name = 2;
  string last_name = 3;
  int64 date_of_birth = 4;
  string gender = 5;
  string email = 6;
  string phone = 7;
  string address = 8;
  string jmbg = 9;
  string created_at = 11;
}

service ClientLimitService {
  rpc GetClientLimits(GetClientLimitRequest) returns (ClientLimitResponse);
  rpc SetClientLimits(SetClientLimitRequest) returns (ClientLimitResponse);
}

message GetClientLimitRequest { int64 client_id = 1; }

message SetClientLimitRequest {
  int64 client_id = 1;
  string daily_limit = 2;
  string monthly_limit = 3;
  string transfer_limit = 4;
  int64 set_by_employee = 5;
}

message ClientLimitResponse {
  int64 id = 1;
  int64 client_id = 2;
  string daily_limit = 3;
  string monthly_limit = 4;
  string transfer_limit = 5;
  int64 set_by_employee = 6;
}
