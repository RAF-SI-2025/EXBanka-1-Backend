syntax = "proto3";
package card;
option go_package = "github.com/exbanka/contract/cardpb;cardpb";

service CardService {
  rpc CreateCard(CreateCardRequest) returns (CardResponse);
  rpc GetCard(GetCardRequest) returns (CardResponse);
  rpc ListCardsByAccount(ListCardsByAccountRequest) returns (ListCardsResponse);
  rpc ListCardsByClient(ListCardsByClientRequest) returns (ListCardsResponse);
  rpc BlockCard(BlockCardRequest) returns (CardResponse);
  rpc UnblockCard(UnblockCardRequest) returns (CardResponse);
  rpc DeactivateCard(DeactivateCardRequest) returns (CardResponse);
  rpc CreateAuthorizedPerson(CreateAuthorizedPersonRequest) returns (AuthorizedPersonResponse);
  rpc GetAuthorizedPerson(GetAuthorizedPersonRequest) returns (AuthorizedPersonResponse);

  // Audit-trail reads. Returns changelog rows scoped by entity_type +
  // entity_id; pagination matches list endpoints (1-based page).
  rpc ListChangelog(ListChangelogRequest) returns (ListChangelogResponse);
}

message ListChangelogRequest {
  string entity_type = 1; // e.g. "card"
  int64  entity_id   = 2;
  int32  page        = 3;
  int32  page_size   = 4;
}

message ChangelogEntry {
  uint64 id          = 1;
  string entity_type = 2;
  int64  entity_id   = 3;
  string action      = 4;
  string field_name  = 5;
  string old_value   = 6;
  string new_value   = 7;
  int64  changed_by  = 8;
  int64  changed_at  = 9;
  string reason      = 10;
}

message ListChangelogResponse {
  repeated ChangelogEntry entries = 1;
  int64                   total   = 2;
}

message CreateCardRequest {
  string account_number = 1;
  uint64 owner_id = 2;
  string owner_type = 3;
  string card_brand = 4;
}

message GetCardRequest { uint64 id = 1; }
message ListCardsByAccountRequest { string account_number = 1; }
message ListCardsByClientRequest { uint64 client_id = 1; }
message ListCardsResponse { repeated CardResponse cards = 1; }
message BlockCardRequest { uint64 id = 1; }
message UnblockCardRequest { uint64 id = 1; }
message DeactivateCardRequest { uint64 id = 1; }

message CardResponse {
  uint64 id = 1;
  string card_number = 2;
  string card_number_full = 3;
  string card_type = 4;
  string card_name = 5;
  string card_brand = 6;
  string created_at = 7;
  string expires_at = 8;
  string account_number = 9;
  string cvv = 10;
  string card_limit = 11;
  string status = 12;
  string owner_type = 13;
  uint64 owner_id = 14;
}

message CreateAuthorizedPersonRequest {
  string first_name = 1;
  string last_name = 2;
  int64 date_of_birth = 3;
  string gender = 4;
  string email = 5;
  string phone = 6;
  string address = 7;
  uint64 account_id = 8;
}

message GetAuthorizedPersonRequest { uint64 id = 1; }

message AuthorizedPersonResponse {
  uint64 id = 1;
  string first_name = 2;
  string last_name = 3;
  int64 date_of_birth = 4;
  string gender = 5;
  string email = 6;
  string phone = 7;
  string address = 8;
  uint64 account_id = 9;
  string created_at = 10;
}

service VirtualCardService {
  rpc CreateVirtualCard(CreateVirtualCardRequest) returns (CardResponse);
  rpc SetCardPin(SetCardPinRequest) returns (SetCardPinResponse);
  rpc VerifyCardPin(VerifyCardPinRequest) returns (VerifyCardPinResponse);
  rpc TemporaryBlockCard(TemporaryBlockCardRequest) returns (CardResponse);
  rpc UseCard(UseCardRequest) returns (UseCardResponse);
}

message CreateVirtualCardRequest {
  string account_number = 1;
  uint64 owner_id = 2;
  string card_brand = 3;
  string usage_type = 4;
  int32 max_uses = 5;
  int32 expiry_months = 6;
  string card_limit = 7;
}

message SetCardPinRequest {
  uint64 id = 1;
  string pin = 2;
}

message SetCardPinResponse {
  bool success = 1;
  string message = 2;
}

message VerifyCardPinRequest {
  uint64 id = 1;
  string pin = 2;
}

message VerifyCardPinResponse {
  bool valid = 1;
  string message = 2;
}

message TemporaryBlockCardRequest {
  uint64 id = 1;
  int32 duration_hours = 2;
  string reason = 3;
}

message UseCardRequest { uint64 id = 1; }

message UseCardResponse { bool success = 1; }

service CardRequestService {
  rpc CreateCardRequest(CreateCardRequestRequest) returns (CardRequestResponse);
  rpc GetCardRequest(GetCardRequestRequest) returns (CardRequestResponse);
  rpc ListCardRequests(ListCardRequestsRequest) returns (ListCardRequestsResponse);
  rpc ListCardRequestsByClient(ListCardRequestsByClientRequest) returns (ListCardRequestsResponse);
  rpc ApproveCardRequest(ApproveCardRequestRequest) returns (CardRequestApprovedResponse);
  rpc RejectCardRequest(RejectCardRequestRequest) returns (CardRequestResponse);
}

message CreateCardRequestRequest {
  uint64 client_id = 1;
  string account_number = 2;
  string card_brand = 3;
  string card_type = 4;
  string card_name = 5;
}

message CardRequestResponse {
  uint64 id = 1;
  uint64 client_id = 2;
  string account_number = 3;
  string card_brand = 4;
  string card_type = 5;
  string card_name = 6;
  string status = 7;
  string reason = 8;
  uint64 approved_by = 9;
  string created_at = 10;
  string updated_at = 11;
}

message CardRequestApprovedResponse {
  CardRequestResponse request = 1;
  CardResponse card = 2;
}

message GetCardRequestRequest {
  uint64 id = 1;
}

message ListCardRequestsRequest {
  string status = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListCardRequestsResponse {
  repeated CardRequestResponse requests = 1;
  int64 total = 2;
}

message ListCardRequestsByClientRequest {
  uint64 client_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ApproveCardRequestRequest {
  uint64 id = 1;
  uint64 employee_id = 2;
}

message RejectCardRequestRequest {
  uint64 id = 1;
  uint64 employee_id = 2;
  string reason = 3;
}
